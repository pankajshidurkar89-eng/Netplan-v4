// ─── SESSION CACHE (in-memory, per browser tab, avoids duplicate API calls) ──
const SESSION = { suggest: {}, geo: {}, route: {} };

// ─── API HELPERS ──────────────────────────────────────────────────────────────
async function apiSuggest(q) {
  const k = q.trim().toLowerCase();
  if (SESSION.suggest[k]) return SESSION.suggest[k];
  const r = await fetch(`/api/suggest?q=${encodeURIComponent(q)}`);
  const d = await r.json();
  SESSION.suggest[k] = d.results || [];
  return SESSION.suggest[k];
}

async function apiGeocode(eLoc) {
  if (SESSION.geo[eLoc]) return SESSION.geo[eLoc];
  const r = await fetch(`/api/geocode?eloc=${encodeURIComponent(eLoc)}`);
  if (!r.ok) return null;
  const d = await r.json();
  if (d.error) return null;
  SESSION.geo[eLoc] = d;
  return d;
}

async function apiRoute(olat, olng, dlat, dlng) {
  const k = `${olat.toFixed(3)},${olng.toFixed(3)}|${dlat.toFixed(3)},${dlng.toFixed(3)}`;
  if (SESSION.route[k]) return SESSION.route[k];
  const r = await fetch(`/api/route?olat=${olat}&olng=${olng}&dlat=${dlat}&dlng=${dlng}`);
  const d = await r.json();
  SESSION.route[k] = d;
  return d;
}

// ─── DEFAULT CONFIG ────────────────────────────────────────────────────────────
const DEF_CFG = {
  yieldThreshold: 75, maxDryRun: 150, maxLegs: 3, maxReturnKm: 600,
  capacity: 30, workingDays: 26, singleRange: 1000, doubleRange: 2000,
  fuelBuf: 0.85, driverSingle: 700, driverDouble: 1200,
};

// ─── GEO UTILS ────────────────────────────────────────────────────────────────
function hvs(la1,lo1,la2,lo2){
  const R=6371,x=(la2-la1)*Math.PI/180,y=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(x/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(y/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
const hvRoad=(la1,lo1,la2,lo2)=>Math.round(hvs(la1,lo1,la2,lo2)*1.3);

// ─── FUEL PLANNER ─────────────────────────────────────────────────────────────
function planFuel(oLat,oLng,dLat,dLng,dist,vType,cfg){
  const eff=(vType==="LNG_DOUBLE"?cfg.doubleRange:cfg.singleRange)*cfg.fuelBuf;
  if(dist<=eff)return{ok:true,stops:[],n:0};
  const on=LNG_STNS.filter(s=>{
    const t=hvs(oLat,oLng,s.lat,s.lng)+hvs(s.lat,s.lng,dLat,dLng);
    return t<=hvs(oLat,oLng,dLat,dLng)*1.5+80;
  }).sort((a,b)=>hvs(oLat,oLng,a.lat,a.lng)-hvs(oLat,oLng,b.lat,b.lng));
  let pool=[...on],stops=[],pos={lat:oLat,lng:oLng},left=eff,ok=true,it=0;
  while(it++<20){
    if(hvs(pos.lat,pos.lng,dLat,dLng)*1.28<=left)break;
    const reach=pool.filter(s=>{const d=hvs(pos.lat,pos.lng,s.lat,s.lng)*1.28;return d<=left&&d>30;});
    if(!reach.length){ok=false;break;}
    const best=reach.sort((a,b)=>hvs(a.lat,a.lng,dLat,dLng)-hvs(b.lat,b.lng,dLat,dLng))[0];
    stops.push(best);pool.splice(0,pool.indexOf(best)+1);pos={lat:best.lat,lng:best.lng};left=eff;
  }
  return{ok,stops,n:stops.length};
}

// ─── STANDALONE LANE YIELD ────────────────────────────────────────────────────
function calcLaneYield(lane, cfg) {
  if (!lane.origin || !lane.dest || !lane.dist) return null;
  const d = lane.dist;
  const autoV = d > cfg.singleRange * cfg.fuelBuf ? "LNG_DOUBLE" : "LNG_SINGLE";
  const autoD = d > cfg.driverSingle ? "DOUBLE" : "SINGLE";
  const vType = (!lane.vType || lane.vType === "AUTO") ? autoV : lane.vType;
  const dType = (!lane.dType || lane.dType === "AUTO") ? autoD : lane.dType;
  const depot = lane.depot || lane.origin;

  const fwdRev = lane.fwdRate * cfg.capacity;
  const revRev = (lane.revTonnes || 0) * (lane.revRate || 0);
  const revPerTrip = fwdRev + revRev;
  const loadedKm = d + ((lane.revTonnes || 0) > 0 ? d : 0);
  const emptyKm = (lane.revTonnes || 0) > 0 ? 0 : d;
  const totalKm = d * 2;
  const yieldKm = revPerTrip / totalKm;

  const transitDays = Math.ceil(d / (dType === "DOUBLE" ? cfg.driverDouble : cfg.driverSingle));
  const rtDays = transitDays * 2;
  const tripsPerMonth = Math.ceil((lane.monthlyTonnes || 0) / cfg.capacity);
  const truckDays = tripsPerMonth * rtDays;
  const trucksNeeded = Math.ceil(truckDays / cfg.workingDays) || 0;
  const fuel = planFuel(lane.origin.lat, lane.origin.lng, lane.dest.lat, lane.dest.lng, d, vType, cfg);

  const thr = cfg.yieldThreshold;
  let verdict = yieldKm >= thr && fuel.ok ? "OPERATE"
    : yieldKm >= thr && !fuel.ok ? "INFRA_RISK"
    : yieldKm >= thr * 0.8 ? "MARGINAL" : "DROP";

  return { vType, dType, depot, fwdRev: Math.round(fwdRev), revRev: Math.round(revRev),
    revPerTrip: Math.round(revPerTrip), loadedKm, emptyKm, totalKm,
    yieldKm: Math.round(yieldKm * 10) / 10, transitDays, rtDays,
    tripsPerMonth, truckDays, trucksNeeded, fuel, verdict };
}

// ─── CIRCUIT YIELD ────────────────────────────────────────────────────────────
function calcCircuitYield(legs, connDists, returnDist, cfg) {
  const totalRev = legs.reduce((s, l) => s + l.revPerTrip, 0);
  const loadedKm = legs.reduce((s, l) => s + l.loadedKm, 0);
  const dryRunKm = connDists.reduce((s, d) => s + d, 0);
  const totalKm  = loadedKm + dryRunKm + returnDist;
  const yieldKm  = totalKm > 0 ? totalRev / totalKm : 0;

  const loadDays  = legs.reduce((s, l) => s + l.transitDays, 0);
  const dryDays   = connDists.reduce((s, d) => s + Math.ceil(d / cfg.driverSingle), 0);
  const retDays   = Math.ceil(returnDist / cfg.driverSingle);
  const circuitDays = loadDays + dryDays + retDays;
  const circuitsPerTruck = Math.max(Math.floor(cfg.workingDays / Math.max(circuitDays, 1)), 1);

  const legTrips = legs.map(l => l.tripsPerMonth || 0);
  const minTrips = Math.min(...legTrips);
  const maxTrips = Math.max(...legTrips);
  const hasImbalance = maxTrips > minTrips;

  const tightTrucks = Math.ceil(minTrips / circuitsPerTruck);
  const maxTrucks   = Math.ceil(maxTrips / circuitsPerTruck);
  const standaloneTrucks = legs.reduce((s, l) => s + (l.trucksNeeded || 0), 0);

  // ── Fuel planning: LOADED legs only ──────────────────────────────────────
  // Each loaded leg is an independent fuel problem — tank resets at each stop.
  // Empty legs (dry run repositioning + return to depot) are excluded:
  //   vehicles are unloaded and have scheduling flexibility on those segments.
  const legFuel = legs.map(leg => {
    const vType = leg.vType && leg.vType !== "AUTO" ? leg.vType
      : leg.dist > cfg.singleRange * cfg.fuelBuf ? "LNG_DOUBLE" : "LNG_SINGLE";
    return planFuel(
      leg.origin.lat, leg.origin.lng,
      leg.dest.lat,   leg.dest.lng,
      leg.dist, vType, cfg
    );
  });
  const fuelOk         = legFuel.every(f => f.ok);
  const totalFuelStops = legFuel.reduce((s, f) => s + f.n, 0);
  const infraLegs      = legFuel.map((f, i) => !f.ok ? i : -1).filter(i => i >= 0); // indices of legs with no pump

  const thr = cfg.yieldThreshold;
  // INFRA_RISK: yield clears threshold but at least one loaded leg has no LNG pump coverage
  const verdict = yieldKm >= thr && fuelOk  ? "OPERATE"
    : yieldKm >= thr && !fuelOk             ? "INFRA_RISK"
    : yieldKm >= thr * 0.8                  ? "MARGINAL"
    :                                          "DROP";

  return {
    totalRev: Math.round(totalRev), loadedKm: Math.round(loadedKm),
    dryRunKm: Math.round(dryRunKm), returnDist: Math.round(returnDist),
    totalKm: Math.round(totalKm), yieldKm: Math.round(yieldKm * 10) / 10,
    loadPct: Math.round((loadedKm / totalKm) * 100),
    circuitDays, circuitsPerTruck,
    legTrips, minTrips, maxTrips, hasImbalance,
    tightCircuits: minTrips, tightTrucks,
    tightExcess: legTrips.map(t => t - minTrips),
    maxCircuits: maxTrips, maxTrucks,
    maxShortfall: legTrips.map(t => maxTrips - t),
    standaloneTrucks,
    trucksSavedTight: Math.max(standaloneTrucks - tightTrucks, 0),
    trucksSavedMax:   Math.max(standaloneTrucks - maxTrucks, 0),
    improvement: Math.round((yieldKm - Math.max(...legs.map(l => l.yieldKm || 0))) * 10) / 10,
    legFuel, fuelOk, totalFuelStops, infraLegs,
    verdict,
  };
}

// ─── CIRCUIT SEARCH ENGINE ────────────────────────────────────────────────────
async function findAllCircuits(lanes, cfg, onProgress) {
  const results = [];
  const maxLegs  = cfg.maxLegs;
  const maxDry   = cfg.maxDryRun;
  const maxRet   = cfg.maxReturnKm;
  let apiCalls = 0;

  // Pre-compute haversine road estimates between all destination→next origin pairs
  const pairHvs = {};
  for (const a of lanes) for (const b of lanes) {
    if (a.id === b.id || !a.dest || !b.origin) continue;
    pairHvs[`${a.id}>${b.id}`] = hvRoad(a.dest.lat, a.dest.lng, b.origin.lat, b.origin.lng);
  }

  const seen = new Set();

  async function build(path) {
    const last  = path[path.length - 1];
    const depot = path[0].depot || path[0].origin;

    if (path.length >= 2) {
      const retHvs = hvRoad(last.dest.lat, last.dest.lng, depot.lat, depot.lng);
      if (retHvs <= maxRet * 1.4) {
        const key = path.map(l => l.id).join(">");
        if (!seen.has(key)) {
          seen.add(key);

          // OSRM-replaced with /api/route for each connection
          const connDists = [];
          let valid = true;
          for (let i = 0; i < path.length - 1; i++) {
            const r = await apiRoute(path[i].dest.lat, path[i].dest.lng, path[i+1].origin.lat, path[i+1].origin.lng);
            apiCalls++;
            if (r.dist > maxDry) { valid = false; break; }
            connDists.push(r.dist);
            await new Promise(r => setTimeout(r, 40));
          }
          if (valid) {
            const retR = await apiRoute(last.dest.lat, last.dest.lng, depot.lat, depot.lng);
            apiCalls++;
            if (retR.dist <= maxRet) {
              const cy = calcCircuitYield(path, connDists, retR.dist, cfg);
              results.push({ id: key, legs: [...path], connDists, returnDist: retR.dist, depotName: depot.name, ...cy });
              onProgress(`${results.length} circuits found · ${apiCalls} API calls (cached hits free)`);
            }
          }
        }
      }
    }

    if (path.length < maxLegs) {
      const usedIds = new Set(path.map(l => l.id));
      for (const next of lanes) {
        if (usedIds.has(next.id) || !last.dest || !next.origin) continue;
        const approx = pairHvs[`${last.id}>${next.id}`] || 999;
        if (approx <= maxDry * 1.4) await build([...path, next]);
      }
    }
  }

  for (let i = 0; i < lanes.length; i++) {
    onProgress(`Scanning from lane ${i + 1}/${lanes.length}: ${lanes[i].origin?.placeName || lanes[i].origin?.name}…`);
    await build([lanes[i]]);
    await new Promise(r => setTimeout(r, 20));
  }

  return results.sort((a, b) => b.yieldKm - a.yieldKm || b.trucksSavedTight - a.trucksSavedTight);
}

// ─── FORMAT HELPERS ───────────────────────────────────────────────────────────
const f2 = n => (isNaN(n) || n == null) ? "-" : Math.round(n).toLocaleString("en-IN");
const f1 = n => (isNaN(n) || n == null) ? "-" : (Math.round(n * 10) / 10).toLocaleString("en-IN");

function exportCSV(rows, headers, name) {
  const csv = [headers, ...rows].map(r => r.join(",")).join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
  a.download = `${name}.csv`; a.click();
}

function Pill({ col, children }) {
  const m = { green:["rgba(16,185,129,.12)","rgba(16,185,129,.4)",T.grn], yellow:["rgba(245,158,11,.12)","rgba(245,158,11,.4)",T.yel], red:["rgba(239,68,68,.12)","rgba(239,68,68,.4)",T.red], blue:["rgba(14,165,233,.12)","rgba(14,165,233,.4)",T.acc], purple:["rgba(139,92,246,.12)","rgba(139,92,246,.4)",T.pur], orange:["rgba(249,115,22,.12)","rgba(249,115,22,.4)",T.org], grey:["rgba(255,255,255,.05)","rgba(255,255,255,.12)",T.sub] };
  const [bg, bd, tx] = m[col] || m.grey;
  return <span style={{ display:"inline-flex", alignItems:"center", padding:"2px 8px", borderRadius:4, fontSize:10, fontWeight:700, letterSpacing:"0.07em", textTransform:"uppercase", background:bg, border:`1px solid ${bd}`, color:tx }}>{children}</span>;
}
function VP({ v }) { const m = { OPERATE:"green", INFRA_RISK:"yellow", MARGINAL:"purple", DROP:"red" }; return <Pill col={m[v] || "grey"}>{vl(v)}</Pill>; }

const card = () => ({ background:T.panel, border:`1px solid ${T.bdr}`, borderRadius:8, padding:16, marginBottom:14 });
const ttl  = () => ({ fontSize:10, letterSpacing:"0.14em", textTransform:"uppercase", color:T.dim, marginBottom:12, fontWeight:700 });
const lbl  = () => ({ display:"block", fontSize:10, color:T.dim, textTransform:"uppercase", letterSpacing:"0.09em", marginBottom:5 });
const inp  = () => ({ width:"100%", background:T.surf, border:`1px solid ${T.bdr}`, borderRadius:5, color:T.txt, padding:"8px 10px", fontSize:12, outline:"none", boxSizing:"border-box", fontFamily:"inherit" });

function Btn({ v = "ghost", children, onClick, disabled, sm }) {
  const p = sm ? "4px 10px" : "8px 16px", fs = sm ? 10 : 11;
  const b = { padding:p, borderRadius:5, fontSize:fs, fontWeight:700, letterSpacing:"0.07em", textTransform:"uppercase", cursor:disabled?"not-allowed":"pointer", fontFamily:"inherit", border:"none", opacity:disabled?.4:1 };
  if (v === "primary") return <button style={{ ...b, background:`linear-gradient(135deg,#1e40af,${T.acc})`, color:"#fff" }} onClick={onClick} disabled={disabled}>{children}</button>;
  if (v === "success") return <button style={{ ...b, background:`linear-gradient(135deg,#065f46,${T.grn})`, color:"#fff" }} onClick={onClick} disabled={disabled}>{children}</button>;
  if (v === "danger")  return <button style={{ ...b, background:"rgba(239,68,68,.1)", border:`1px solid rgba(239,68,68,.3)`, color:T.red }} onClick={onClick} disabled={disabled}>{children}</button>;
  if (v === "warn")    return <button style={{ ...b, background:"rgba(245,158,11,.1)", border:`1px solid rgba(245,158,11,.3)`, color:T.yel }} onClick={onClick} disabled={disabled}>{children}</button>;
  return <button style={{ ...b, background:"transparent", border:`1px solid ${T.bdr}`, color:T.sub }} onClick={onClick} disabled={disabled}>{children}</button>;
}
function TH({ children }) { return <th style={{ padding:"7px 10px", background:"#020508", color:T.dim, textAlign:"left", fontSize:10, letterSpacing:"0.08em", textTransform:"uppercase", fontWeight:700, borderBottom:`1px solid ${T.bdr}`, whiteSpace:"nowrap" }}>{children}</th>; }
function TD({ children, color, bold, dim, small }) { return <td style={{ padding:"7px 10px", borderBottom:`1px solid #05091a`, color:dim?T.dim:color||T.txt, fontWeight:bold?700:400, fontSize:small?11:12, verticalAlign:"middle" }}>{children}</td>; }

function YieldBar({ value, threshold }) {
  const pct = Math.min((value / Math.max(threshold * 1.5, 1)) * 100, 100);
  const col  = value >= threshold ? T.grn : value >= threshold * 0.8 ? T.yel : T.red;
  return <div style={{ display:"flex", alignItems:"center", gap:7 }}>
    <div style={{ flex:1, height:5, background:T.surf, borderRadius:3, overflow:"hidden", minWidth:50 }}>
      <div style={{ width:`${pct}%`, height:"100%", background:col, borderRadius:3 }} />
    </div>
    <span style={{ fontWeight:800, color:col, fontSize:12, minWidth:40, textAlign:"right" }}>₹{f1(value)}</span>
  </div>;
}

function KmBar({ loaded, dryRun, returnKm, total }) {
  const lp = Math.round((loaded  / Math.max(total, 1)) * 100);
  const dp = Math.round((dryRun  / Math.max(total, 1)) * 100);
  return <div>
    <div style={{ display:"flex", height:7, borderRadius:4, overflow:"hidden", gap:1 }}>
      <div style={{ width:`${lp}%`,        background:T.grn }} title={`Loaded: ${loaded}km`} />
      <div style={{ width:`${dp}%`,        background:T.yel }} title={`Dry run: ${dryRun}km`} />
      <div style={{ width:`${100-lp-dp}%`, background:`${T.red}88` }} title={`Return: ${returnKm}km`} />
    </div>
    <div style={{ display:"flex", gap:10, fontSize:10, color:T.dim, marginTop:4, flexWrap:"wrap" }}>
      <span style={{ color:T.grn }}>▬ {f2(loaded)}km loaded ({lp}%)</span>
      {dryRun > 0 && <span style={{ color:T.yel }}>▬ {f2(dryRun)}km dry run</span>}
      <span style={{ color:T.red }}>▬ {f2(returnKm)}km return/empty</span>
    </div>
  </div>;
}

function StatCard({ label, value, color, sub }) {
  return <div style={{ background:T.panel, border:`1px solid ${color}22`, borderLeft:`3px solid ${color}`, borderRadius:7, padding:"12px 14px" }}>
    <div style={{ fontSize:19, fontWeight:800, color, lineHeight:1 }}>{value}</div>
    {sub && <div style={{ fontSize:10, color, opacity:.65, marginTop:1 }}>{sub}</div>}
    <div style={{ fontSize:10, color:T.dim, textTransform:"uppercase", letterSpacing:"0.08em", marginTop:5 }}>{label}</div>
  </div>;
}

// ─── LOCATION SEARCH (MapmyIndia autosuggest → eLoc → geocode) ───────────────
function LocSearch({ label, value, onSelect, ph, icon }) {
  const [q,      setQ]    = React.useState(value?.placeName || value?.name || "");
  const [res,    setRes]  = React.useState([]);
  const [busy,   setBusy] = React.useState(false);
  const [open,   setOpen] = React.useState(false);
  const [status, setSts]  = React.useState(""); // "typing"|"geocoding"|"ok"|"err"
  const deb  = React.useRef();
  const wrap = React.useRef();

  React.useEffect(() => {
    if (value) { const n = value.placeName || value.name || ""; if (n !== q) setQ(n); }
  }, [value]);

  React.useEffect(() => {
    const h = e => { if (wrap.current && !wrap.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  const search = async v => {
    if (v.length < 2) { setRes([]); setOpen(false); return; }
    setBusy(true); setSts("typing");
    const results = await apiSuggest(v);
    setRes(results); setOpen(results.length > 0);
    if (!results.length) setSts("err");
    setBusy(false);
  };

  const onChange = e => {
    const v = e.target.value; setQ(v); onSelect(null); setSts("");
    clearTimeout(deb.current);
    deb.current = setTimeout(() => search(v), 350);
  };

  const pick = async r => {
    setOpen(false); setRes([]);
    setQ(r.placeName); setBusy(true); setSts("geocoding");
    const geo = await apiGeocode(r.eLoc);
    if (geo) {
      onSelect({ ...geo, placeName: r.placeName, placeAddress: r.placeAddress });
      setSts("ok");
    } else {
      setSts("err");
    }
    setBusy(false);
  };

  const iconMap = { ok:T.grn, err:T.red, geocoding:T.yel, typing:T.dim };
  const symMap  = { ok:"✓", err:"✗", geocoding:"⏳", typing:"⏳" };

  return <div ref={wrap} style={{ position:"relative" }}>
    <label style={lbl()}>{icon || "📍"} {label}</label>
    <div style={{ position:"relative" }}>
      <input value={q} onChange={onChange} placeholder={ph || "Type any city, plant, port…"}
        autoComplete="off"
        style={{ ...inp(), borderColor: status==="ok"?T.grn:status==="err"?T.red:T.bdr, paddingRight:28 }} />
      <span style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", pointerEvents:"none",
        color: iconMap[status] || T.dim, fontSize:12 }}>
        {symMap[status] || "⌕"}
      </span>
    </div>
    {open && res.length > 0 && <div style={{ position:"absolute", top:"calc(100% + 3px)", left:0, right:0, background:T.panel, border:`1px solid ${T.bdrH}`, borderRadius:7, zIndex:999, maxHeight:220, overflowY:"auto", boxShadow:"0 14px 40px rgba(0,0,0,.9)" }}>
      {res.map((r, i) => <div key={i} onMouseDown={() => pick(r)}
        style={{ padding:"9px 13px", cursor:"pointer", borderBottom:`1px solid ${T.bdr}` }}
        onMouseEnter={e => e.currentTarget.style.background = "#0e1d30"}
        onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
        <div style={{ fontWeight:700, color:T.acc, fontSize:12, marginBottom:1 }}>{r.placeName}</div>
        <div style={{ fontSize:10, color:T.dim, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r.placeAddress}</div>
        <div style={{ fontSize:9, color:T.dim, marginTop:1 }}>eLoc: {r.eLoc} · {r.type}</div>
      </div>)}
    </div>}
    {value && <div style={{ fontSize:10, color:T.grn, marginTop:3 }}>📍 {value.lat?.toFixed(4)}, {value.lng?.toFixed(4)} — {value.placeAddress?.slice(0, 60)}</div>}
  </div>;
}

        <div style={card()}>
          <div style={ttl()}>🚛 Fleet & Operations</div>

          <Slider label="Double Driver Range" k="driverDouble" min={800} max={1400} step={50} unit=" km/day"/>
        </div>

          <Slider label="Double Tank Range" k="doubleRange" min={1500} max={2500} step={50} unit=" km"/>

// ─── LANE MASTER TAB ─────────────────────────────────────────────────────────
function LaneMasterTab({ lanes, setLanes, cfg, setStatus }) {
  const [form,      setForm]     = React.useState({ origin:null, dest:null, depot:null, monthlyTonnes:300, fwdRate:3500, revTonnes:0, revRate:0, vType:"AUTO", dType:"AUTO", laneType:"EXISTING", customer:"" });
  const [computing, setComputing] = React.useState(false);
  const [preview,   setPreview]  = React.useState(null);
  const csvRef = React.useRef();
  const sf = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const compute = React.useCallback(async () => {
    if (!form.origin || !form.dest) return;
    setComputing(true); setPreview(null);
    const r    = await apiRoute(form.origin.lat, form.origin.lng, form.dest.lat, form.dest.lng);
    const depot = form.depot || form.origin;
    const base  = { ...form, dist:r.dist, dur:r.dur, live:r.live, depot };
    const y     = calcLaneYield(base, cfg);
    setPreview({ ...base, ...y });
    setComputing(false);
  }, [form, cfg]);

  React.useEffect(() => { if (form.origin && form.dest) compute(); }, [form.origin, form.dest, form.fwdRate, form.revTonnes, form.revRate, form.vType, form.dType, form.monthlyTonnes, form.depot]);

  const addLane = () => {
    if (!preview) return;
    const lane = { id:Date.now(), laneId:`L${String(lanes.length + 1).padStart(3, "0")}`, source:"manual", ...preview };
    setLanes(p => [...p, lane]);
    setForm(f => ({ ...f, origin:null, dest:null, depot:null, customer:"", revTonnes:0, revRate:0 }));
    setPreview(null);
  };

  const handleCSV = async e => {
    const f = e.target.files[0]; if (!f) return;
    setStatus("⏳ Processing CSV…");
    const text  = await f.text();
    const lines = text.trim().split("\n").filter(l => l.trim());
    if (lines.length < 2) { setStatus("⚠ Empty file"); return; }
    const hdrs = lines[0].split(",").map(h => h.trim().toLowerCase().replace(/[^a-z0-9_]/g, "_"));
    const get  = (row, ...keys) => { for (const k of keys) if (row[k] !== undefined && row[k] !== "") return row[k]; return ""; };
    let added = 0, skipped = 0;

    for (const line of lines.slice(1)) {
      const vals = line.split(",").map(v => v.trim());
      const row  = {}; hdrs.forEach((h, i) => { row[h] = vals[i] || ""; });

      const oEloc  = get(row, "origin_eloc",  "from_eloc");
      const dEloc  = get(row, "dest_eloc",    "to_eloc");
      const dpEloc = get(row, "depot_eloc",   "base_eloc");

      if (!oEloc || !dEloc) { skipped++; continue; }

      const [og, dg, dpg] = await Promise.all([
        apiGeocode(oEloc), apiGeocode(dEloc),
        dpEloc ? apiGeocode(dpEloc) : Promise.resolve(null),
      ]);
      if (!og || !dg) { skipped++; continue; }

      const depot = dpg || og;
      const mt    = parseFloat(get(row, "monthly_tonnes", "monthly_volume", "tonnes")) || 300;
      const fR    = parseFloat(get(row, "fwd_rate", "rate", "forward_rate")) || 3500;
      const rT    = parseFloat(get(row, "rev_tonnes", "backhaul_tonnes")) || 0;
      const rR    = parseFloat(get(row, "rev_rate",   "backhaul_rate"))   || 0;
      const vT    = get(row, "vehicle_type", "vehicle") || "AUTO";
      const dT    = get(row, "driver_type",  "driver")  || "AUTO";
      const lt    = get(row, "lane_type",    "type")    || "EXISTING";
      const cu    = get(row, "customer",     "client");

      const r    = await apiRoute(og.lat, og.lng, dg.lat, dg.lng);
      const base = { id:Date.now() + added, laneId:`CSV_${added + 1}`, origin:og, dest:dg, depot, monthlyTonnes:mt, fwdRate:fR, revTonnes:rT, revRate:rR, vType:vT, dType:dT, laneType:lt, customer:cu, dist:r.dist, dur:r.dur, live:r.live, source:"csv" };
      const y    = calcLaneYield(base, cfg);
      setLanes(p => [...p, { ...base, ...y }]);
      added++; setStatus(`⏳ ${added} lanes loaded…`);
      await new Promise(r => setTimeout(r, 200));
    }
    setStatus(`✓ ${added} lanes loaded${skipped ? ` · ${skipped} skipped` : ""}`);
    e.target.value = "";
  };

  React.useEffect(() => {
    if (!lanes.length) return;
    setLanes(prev => prev.map(l => {
      if (!l.origin || !l.dest || !l.dist) return l;
      return { ...l, ...calcLaneYield(l, cfg) };
    }));
  }, [cfg]);

  return <div>
    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:14 }}>
      {/* FORM */}
      <div style={card()}>
        <div style={ttl()}>➕ Add Lane</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
          <LocSearch icon="🟢" label="Origin" value={form.origin} onSelect={v => sf("origin", v)} ph="Plant / factory / port…"/>
          <LocSearch icon="🔴" label="Destination" value={form.dest} onSelect={v => sf("dest", v)} ph="Delivery location…"/>
        </div>
        <div style={{ marginBottom:10, padding:"10px 12px", background:"#060f1a", borderRadius:6, border:`1px solid ${T.acc}22` }}>
          <LocSearch icon="🏠" label="Home Depot (vehicle returns here after circuit)" value={form.depot} onSelect={v => sf("depot", v)} ph="Leave blank = defaults to origin"/>
          <div style={{ fontSize:10, color:T.dim, marginTop:6 }}>After completing {cfg.maxLegs} loaded leg{cfg.maxLegs > 1 ? "s" : ""}, vehicle drives empty back here. <span style={{ color:T.yel }}>Return km counts in yield denominator.</span></div>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:9, marginBottom:9 }}>
          <div><label style={lbl()}>Monthly Tonnes</label><input type="number" value={form.monthlyTonnes} onChange={e => sf("monthlyTonnes", +e.target.value)} style={inp()} /></div>
          <div><label style={lbl()}>Fwd Rate ₹/T</label><input type="number" value={form.fwdRate} onChange={e => sf("fwdRate", +e.target.value)} style={inp()} /></div>
          <div><label style={lbl()}>Lane Type</label>
            <select value={form.laneType} onChange={e => sf("laneType", e.target.value)} style={inp()}>
              <option value="EXISTING">Existing (Contracted)</option>
              <option value="PROBABLE">Probable (Estimated)</option>
            </select>
          </div>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:9, marginBottom:9 }}>
          <div><label style={lbl()}>Rev Tonnes</label><input type="number" min={0} value={form.revTonnes} onChange={e => sf("revTonnes", +e.target.value)} style={inp()} /></div>
          <div><label style={lbl()}>Rev Rate ₹/T</label><input type="number" min={0} value={form.revRate} onChange={e => sf("revRate", +e.target.value)} style={inp()} /></div>
          <div><label style={lbl()}>Customer</label><input value={form.customer} onChange={e => sf("customer", e.target.value)} placeholder="Optional" style={inp()} /></div>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:9, marginBottom:12 }}>
          <div><label style={lbl()}>Vehicle Type</label>
            <select value={form.vType} onChange={e => sf("vType", e.target.value)} style={inp()}>
              <option value="AUTO">Auto-Recommend</option>
              <option value="LNG_SINGLE">LNG Single (1000km)</option>
              <option value="LNG_DOUBLE">LNG Double (2000km)</option>
              <option value="EV">EV</option>
            </select>
          </div>
          <div><label style={lbl()}>Driver Config</label>
            <select value={form.dType} onChange={e => sf("dType", e.target.value)} style={inp()}>
              <option value="AUTO">Auto-Recommend</option>
              <option value="SINGLE">Single Driver</option>
              <option value="DOUBLE">Double Driver (relay)</option>
            </select>
          </div>
        </div>
        <div style={{ display:"flex", gap:9, flexWrap:"wrap" }}>
          <Btn v="primary" onClick={compute} disabled={!form.origin || !form.dest || computing}>{computing ? "⏳ Routing…" : "🔄 Compute"}</Btn>
          <Btn v="success" onClick={addLane} disabled={!preview}>+ Add Lane</Btn>
          <Btn onClick={() => csvRef.current?.click()}>📂 Upload CSV</Btn>
          <input ref={csvRef} type="file" accept=".csv" style={{ display:"none" }} onChange={handleCSV} />
        </div>
      </div>

      {/* PREVIEW */}
      <div>
        {computing && <div style={{ ...card(), textAlign:"center", padding:40 }}>
          <div style={{ fontSize:26, marginBottom:8 }}>⏳</div>
          <div style={{ color:T.acc, fontWeight:700, marginBottom:4 }}>MapmyIndia Routing…</div>
          <div style={{ fontSize:10, color:T.dim }}>Checking KV cache first — cache hits are instant</div>
        </div>}
        {!computing && !preview && <div style={{ ...card(), padding:14 }}>
          <div style={ttl()}>📋 CSV Format (eLoc-based)</div>
          <div style={{ fontSize:11, color:T.dim, lineHeight:2, marginBottom:10 }}>
            <span style={{ color:T.acc }}>Required:</span> origin_eloc, dest_eloc, monthly_tonnes, fwd_rate<br/>
            <span style={{ color:T.sub }}>Optional:</span> depot_eloc, rev_tonnes, rev_rate, vehicle_type, driver_type, lane_type, customer<br/>
            <span style={{ color:T.yel }}>eLoc</span> = 6-char MapmyIndia place code — find via autosuggest dropdown below each field
          </div>
          <div style={{ background:"#060f1a", borderRadius:5, padding:"10px 12px", fontSize:11, color:T.dim, lineHeight:1.9 }}>
            origin_eloc,dest_eloc,depot_eloc,monthly_tonnes,fwd_rate,lane_type,customer<br/>
            <span style={{ color:T.grn }}>1T182A,9QGSMN,1T182A,450,4200,EXISTING,Reliance Jamnagar</span><br/>
            <span style={{ color:T.grn }}>9DT6SM,77VZ77,9DT6SM,300,3800,EXISTING,Tata Mumbai</span>
          </div>
        </div>}
        {!computing && preview && <div style={{ ...card(), borderLeft:`3px solid ${vc(preview.verdict)}` }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12, flexWrap:"wrap", gap:7 }}>
            <div>
              <div style={{ fontWeight:800, fontSize:14, color:T.acc, marginBottom:2 }}>{preview.origin?.placeName || preview.origin?.name} → {preview.dest?.placeName || preview.dest?.name}</div>
              <div style={{ fontSize:10, color:T.dim }}>Depot: <span style={{ color:T.yel }}>{preview.depot?.placeName || preview.depot?.name}</span> · {preview.live && !preview.fallback ? "✓ MapmyIndia" : "⚠ Estimated"} · {f2(preview.dist)}km</div>
            </div>
            <VP v={preview.verdict} />
          </div>
          <div style={{ background:"#060f1a", borderRadius:6, padding:"12px 13px", marginBottom:10, border:`1px solid ${vc(preview.verdict)}33` }}>
            <div style={{ fontSize:9, color:T.dim, textTransform:"uppercase", letterSpacing:"0.09em", marginBottom:5 }}>Standalone Yield</div>
            <div style={{ display:"flex", alignItems:"baseline", gap:10, marginBottom:7 }}>
              <span style={{ fontSize:26, fontWeight:800, color:vc(preview.verdict) }}>₹{f1(preview.yieldKm)}/km</span>
              <span style={{ fontSize:11, color:T.dim }}>threshold: ₹{cfg.yieldThreshold}/km</span>
            </div>
            <KmBar loaded={preview.loadedKm} dryRun={0} returnKm={preview.emptyKm} total={preview.totalKm} />
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:7 }}>
            {[{ l:"Rev/Trip", v:`₹${f2(preview.revPerTrip)}`, c:T.grn }, { l:"Trips/Month", v:preview.tripsPerMonth, c:T.acc }, { l:"Trucks Needed", v:preview.trucksNeeded, c:T.yel }].map(m => <div key={m.l} style={{ background:T.surf, padding:"8px 10px", borderRadius:5 }}>
              <div style={{ fontSize:9, color:T.dim, textTransform:"uppercase", marginBottom:2 }}>{m.l}</div>
              <div style={{ fontWeight:700, color:m.c, fontSize:13 }}>{m.v}</div>
            </div>)}
          </div>
        </div>}
      </div>
    </div>

    {/* LANE LIST */}
    {lanes.length > 0 && <div style={card()}>
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10, flexWrap:"wrap", gap:7 }}>
        <div style={ttl()}>{lanes.length} Lanes · {[...new Set(lanes.map(l => l.depot?.placeName || l.depot?.name || l.origin?.placeName))].length} Depots</div>
        <div style={{ display:"flex", gap:7 }}>
          <Btn v="primary" sm onClick={() => exportCSV(lanes.map(l => [l.laneId, l.origin?.placeName || l.origin?.name, l.dest?.placeName || l.dest?.name, l.depot?.placeName || l.depot?.name, l.laneType || "", l.customer || "", l.monthlyTonnes, l.fwdRate, l.revTonnes || 0, l.revRate || 0, l.dist, l.vType, l.dType, l.yieldKm, l.verdict]), ["Lane", "Origin", "Dest", "Depot", "Type", "Customer", "Mo T", "Fwd Rate", "Rev T", "Rev Rate", "Dist", "Vehicle", "Driver", "Yield", "Verdict"], "lane_master")}>⬇ Export</Btn>
          <Btn v="danger" sm onClick={() => setLanes([])}>🗑 Clear</Btn>
        </div>
      </div>
      <div style={{ overflowX:"auto" }}><table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
        <thead><tr>{["Lane", "Route", "Depot", "Type", "Mo Tonnes", "Fwd Rate", "Backhaul", "Dist", "Yield", "Verdict", ""].map(h => <TH key={h}>{h}</TH>)}</tr></thead>
        <tbody>{lanes.map(l => <tr key={l.id} style={{ background:l.verdict === "DROP" ? "rgba(239,68,68,.025)" : l.verdict === "OPERATE" ? "rgba(16,185,129,.015)" : "" }}>
          <TD dim>{l.laneId}</TD>
          <TD bold color={T.acc}>{l.origin?.placeName || l.origin?.name} → {l.dest?.placeName || l.dest?.name}</TD>
          <TD><span style={{ color:T.yel, fontSize:11 }}>🏠 {l.depot?.placeName || l.depot?.name || l.origin?.placeName}</span></TD>
          <TD><Pill col={l.laneType === "PROBABLE" ? "purple" : "blue"}>{l.laneType || "EX"}</Pill></TD>
          <TD>{f2(l.monthlyTonnes)}T</TD>
          <TD>₹{f2(l.fwdRate)}/T</TD>
          <TD color={l.revTonnes > 0 ? T.grn : T.dim} small>{l.revTonnes > 0 ? `${l.revTonnes}T@₹${l.revRate}` : "None"}</TD>
          <TD>{f2(l.dist)}km</TD>
          <TD style={{ minWidth:140 }}><YieldBar value={l.yieldKm || 0} threshold={cfg.yieldThreshold} /></TD>
          <TD><VP v={l.verdict} /></TD>
          <TD><Btn v="danger" sm onClick={() => setLanes(p => p.filter(x => x.id !== l.id))}>✕</Btn></TD>
        </tr>)}</tbody>
      </table></div>
    </div>}
  </div>;
}

// ─── YIELD ANALYSIS TAB ───────────────────────────────────────────────────────
function YieldTab({ lanes, cfg }) {
  if (!lanes.length) return <div style={{ textAlign:"center", padding:52, color:T.dim }}><div style={{ fontSize:34, marginBottom:10 }}>📊</div><div>Add lanes in Lane Master first.</div></div>;

  const groups = { OPERATE:[], INFRA_RISK:[], MARGINAL:[], DROP:[] };
  for (const l of lanes) (groups[l.verdict] || groups.DROP).push(l);
  const avgYield = (lanes.reduce((s, l) => s + (l.yieldKm || 0), 0) / lanes.length).toFixed(1);
  const totalRev = lanes.reduce((s, l) => s + ((l.revPerTrip || 0) * (l.tripsPerMonth || 0)), 0);

  const LaneCard = ({ l }) => <div style={{ padding:"12px 14px", background:T.surf, borderRadius:6, marginBottom:9, border:`1px solid ${vc(l.verdict)}22` }}>
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:7, marginBottom:9 }}>
      <div>
        <span style={{ fontWeight:700, color:T.acc, fontSize:13 }}>{l.origin?.placeName || l.origin?.name} → {l.dest?.placeName || l.dest?.name}</span>
        <span style={{ fontSize:10, color:T.dim, marginLeft:9 }}>{l.customer || ""} · {f2(l.dist)}km · 🏠 {l.depot?.placeName || l.depot?.name || l.origin?.placeName}</span>
      </div>
      <VP v={l.verdict} />
    </div>
    <div style={{ marginBottom:8 }}><YieldBar value={l.yieldKm || 0} threshold={cfg.yieldThreshold} /></div>
    <KmBar loaded={l.loadedKm} dryRun={0} returnKm={l.emptyKm} total={l.totalKm} />
    <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:7, marginTop:9 }}>
      {[{ lb:"Rev/Trip", v:`₹${f2(l.revPerTrip)}`, c:T.grn }, { lb:"Mo Rev", v:`₹${f2((l.revPerTrip || 0) * (l.tripsPerMonth || 0))}`, c:T.grn }, { lb:"Trips/Mo", v:l.tripsPerMonth, c:T.acc }, { lb:"Trucks", v:l.trucksNeeded, c:T.yel }, { lb:"LNG Stops", v:l.fuel?.ok ? `${l.fuel.n}×` : "⚠ Gap", c:l.fuel?.ok ? T.grn : T.red }].map(m => <div key={m.lb} style={{ background:T.panel, padding:"7px 9px", borderRadius:5 }}>
        <div style={{ fontSize:9, color:T.dim, textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:2 }}>{m.lb}</div>
        <div style={{ fontWeight:700, color:m.c, fontSize:12 }}>{m.v}</div>
      </div>)}
    </div>
    {l.verdict === "DROP" && <div style={{ marginTop:8, padding:"7px 11px", background:"rgba(239,68,68,.07)", border:`1px solid rgba(239,68,68,.2)`, borderRadius:5, fontSize:11, color:T.yel }}>Fix: ₹{f2(Math.ceil((cfg.yieldThreshold * l.totalKm) / cfg.capacity))}/T fwd rate needed (currently ₹{f2(l.fwdRate)}), or add backhaul to close ₹{f2(cfg.yieldThreshold * l.totalKm - l.revPerTrip)} gap.</div>}
  </div>;

  const Sec = ({ title, list, bd }) => list.length > 0 && <div style={{ ...card(), border:`1px solid ${bd}` }}>
    <div style={ttl()}>{title} ({list.length})</div>
    {list.map(l => <LaneCard key={l.id} l={l} />)}
  </div>;

  return <div>
    <div style={{ display:"grid", gridTemplateColumns:"repeat(6,1fr)", gap:10, marginBottom:14 }}>
      <StatCard label="Total Lanes" value={lanes.length} color={T.acc} />
      <StatCard label="Operate" value={groups.OPERATE.length} color={T.grn} />
      <StatCard label="Infra Risk" value={groups.INFRA_RISK.length} color={T.yel} />
      <StatCard label="Marginal" value={groups.MARGINAL.length} color={T.pur} />
      <StatCard label="Drop" value={groups.DROP.length} color={T.red} />
      <StatCard label="Avg Yield" value={`₹${avgYield}`} sub="/km" color={parseFloat(avgYield) >= cfg.yieldThreshold ? T.grn : T.yel} />
    </div>
    <Sec title="✓ Operate"             list={groups.OPERATE}    bd="rgba(16,185,129,.2)" />
    <Sec title="⚠ Infrastructure Risk" list={groups.INFRA_RISK} bd="rgba(245,158,11,.2)" />
    <Sec title="≈ Marginal"            list={groups.MARGINAL}   bd="rgba(139,92,246,.2)" />
    <Sec title="✗ Drop"               list={groups.DROP}       bd="rgba(239,68,68,.2)" />
  </div>;
}

// ─── STITCH ENGINE TAB ────────────────────────────────────────────────────────
function StitchTab({ lanes, cfg }) {
  const [circuits, setCircuits]   = React.useState([]);
  const [running,  setRunning]    = React.useState(false);
  const [progress, setProgress]   = React.useState("");
  const [done,     setDone]       = React.useState(false);
  const [iMode,    setIMode]      = React.useState({});
  const legColors = ["#0ea5e9", "#10b981", "#f59e0b", "#8b5cf6"];

  const run = async () => {
    setRunning(true); setCircuits([]); setDone(false);
    try { const res = await findAllCircuits(lanes, cfg, setProgress); setCircuits(res); }
    finally { setRunning(false); setDone(true); }
  };

  const mode = id => iMode[id] || "tight";
  const toggleMode = id => setIMode(m => ({ ...m, [id]: m[id] === "max" ? "tight" : "max" }));

  return <div>
    <div style={{ ...card(), background:"#060d1a", border:`1px solid ${T.acc}22`, marginBottom:14 }}>
      <div style={ttl()}>🔗 N-Leg Circuit Engine · MapmyIndia Routes · Vercel KV Cache</div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:12 }}>
        <div style={{ fontSize:11, color:T.dim, lineHeight:1.9 }}>
          Builds <strong style={{ color:T.txt }}>2–{cfg.maxLegs} leg circuits</strong>. Each connection distance uses MapmyIndia routing via <code style={{ color:T.acc }}>/api/route</code>. Computed routes are cached in Vercel KV for 30 days — <strong style={{ color:T.grn }}>same route computed only once for your whole team.</strong><br/><br/>
          Haversine pre-filter (×1.4) eliminates ~85% of pairs before any API call, keeping costs low.
        </div>
        <div style={{ fontSize:11, color:T.dim, lineHeight:1.9 }}>
          <strong style={{ color:T.yel }}>Yield formula:</strong><br/>
          <code style={{ background:"#04080f", padding:"4px 8px", borderRadius:4, color:T.acc, display:"block", marginTop:4 }}>
            (Rev₁ + Rev₂ + … + RevN)<br/>
            ÷ (dist₁ + conn₁₂ + dist₂ + … + return_to_depot)
          </code>
          <div style={{ marginTop:8 }}>All km in denominator — <span style={{ color:T.grn }}>strict per spec.</span><br/>
          Volume imbalance: <span style={{ color:T.grn }}>both options shown.</span></div>
        </div>
      </div>
      <div style={{ display:"flex", gap:10, flexWrap:"wrap", alignItems:"center" }}>
        <Btn v="primary" onClick={run} disabled={lanes.length < 2 || running}>{running ? `⏳ ${progress}` : `🔗 Find Circuits (${lanes.length} lanes, max ${cfg.maxLegs} legs)`}</Btn>
        {circuits.length > 0 && <Btn onClick={() => exportCSV(circuits.map((c, i) => [i+1, c.legs.map(l=>l.origin?.placeName||l.origin?.name).join(">"), c.depotName, c.legs.length, c.totalKm, c.loadedKm, c.dryRunKm, c.returnDist, c.totalRev, c.yieldKm, c.totalFuelStops, c.fuelOk?"Yes":"No - "+c.infraLegs.map(j=>"Leg "+(j+1)).join("+"), c.tightTrucks, c.trucksSavedTight, c.verdict]), ["#","Legs","Depot","N Legs","Total km","Loaded","Dry Run","Return","Rev","Yield","Fuel Stops","Fuel OK","Trucks","Saved","Verdict"],"circuits")}>⬇ Export</Btn>}
        {done && !running && <span style={{ fontSize:11, color:T.grn }}>{progress}</span>}
      </div>
    </div>

    {done && circuits.length === 0 && <div style={{ textAlign:"center", padding:"36px 20px", color:T.dim }}>
      No circuits within dry run ({cfg.maxDryRun}km) and return ({cfg.maxReturnKm}km) constraints. Try increasing limits in Config.
    </div>}

    {circuits.length > 0 && <>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:10, marginBottom:14 }}>
        <StatCard label="Total Circuits"    value={circuits.length} color={T.acc} />
        <StatCard label="Operate"           value={circuits.filter(c => c.verdict === "OPERATE").length} color={T.grn} />
        <StatCard label="Infra Risk"        value={circuits.filter(c => c.verdict === "INFRA_RISK").length} color={T.yel} sub="yield ok, no pump" />
        <StatCard label="Best Yield"        value={`₹${circuits[0]?.yieldKm}`} sub="/km" color={T.grn} />
        <StatCard label="Max Trucks Saved"  value={Math.max(...circuits.map(c => c.trucksSavedTight), 0)} sub="tight option" color={T.org} />
      </div>

      {circuits.map((c, i) => {
        const m = mode(c.id);
        const trucks = m === "tight" ? c.tightTrucks : c.maxTrucks;
        const saved  = m === "tight" ? c.trucksSavedTight : c.trucksSavedMax;
        return <div key={c.id} style={{ ...card(), borderLeft:`3px solid ${vc(c.verdict)}` }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10, flexWrap:"wrap", gap:7 }}>
            <div>
              <span style={{ fontSize:11, color:T.dim, fontWeight:700 }}>#{i+1} · {c.legs.length}-LEG · Depot: </span>
              <span style={{ color:T.yel, fontWeight:700 }}>🏠 {c.depotName}</span>
            </div>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
              <VP v={c.verdict} />
              {saved > 0 && <Pill col="orange">-{saved} truck{saved > 1 ? "s" : ""}</Pill>}
              {c.hasImbalance && <Pill col="yellow">⚖ Imbalance</Pill>}
            </div>
          </div>

          {/* Circuit path */}
          <div style={{ display:"flex", alignItems:"center", flexWrap:"wrap", gap:4, marginBottom:10, padding:"9px 12px", background:"#040b16", borderRadius:6, fontSize:11 }}>
            <span style={{ color:T.yel, fontWeight:700 }}>🏠</span>
            {c.legs.map((leg, li) => <React.Fragment key={li}>
              {li === 0 && <span style={{ color:T.dim }}> → </span>}
              <span style={{ color:legColors[li % 4], fontWeight:700 }}>{leg.origin?.placeName || leg.origin?.name}</span>
              <span style={{ color:T.dim }}> →[{f2(leg.dist)}km]→ </span>
              <span style={{ color:legColors[li % 4], fontWeight:700 }}>{leg.dest?.placeName || leg.dest?.name}</span>
              {li < c.legs.length - 1 && <span style={{ color:T.red }}> →[dry {c.connDists[li]}km]→ </span>}
            </React.Fragment>)}
            <span style={{ color:T.dim }}> →[ret {c.returnDist}km]→ </span>
            <span style={{ color:T.yel, fontWeight:700 }}>🏠</span>
          </div>

          {/* Yield */}
          <div style={{ background:"#060f1a", borderRadius:6, padding:"12px 13px", marginBottom:10, border:`1px solid ${vc(c.verdict)}33` }}>
            <div style={{ display:"flex", alignItems:"baseline", gap:16, marginBottom:8, flexWrap:"wrap" }}>
              <div><div style={{ fontSize:9, color:T.dim, textTransform:"uppercase", letterSpacing:"0.09em", marginBottom:2 }}>Circuit Yield</div>
                <span style={{ fontSize:26, fontWeight:800, color:vc(c.verdict) }}>₹{f1(c.yieldKm)}/km</span></div>
              <div><div style={{ fontSize:9, color:T.dim, textTransform:"uppercase", letterSpacing:"0.09em", marginBottom:2 }}>vs Best Standalone</div>
                <span style={{ fontSize:16, fontWeight:700, color:c.improvement > 0 ? T.grn : T.red }}>{c.improvement > 0 ? "+" : ""}₹{f1(c.improvement)}/km</span></div>
              <div><div style={{ fontSize:9, color:T.dim, textTransform:"uppercase", letterSpacing:"0.09em", marginBottom:2 }}>Standalone Yields</div>
                <span style={{ fontSize:11 }}>{c.legs.map((l, i) => <span key={i} style={{ marginRight:10 }}>L{i+1}: <strong style={{ color:vc(l.verdict) }}>₹{l.yieldKm}</strong></span>)}</span></div>
            </div>
            <KmBar loaded={c.loadedKm} dryRun={c.dryRunKm} returnKm={c.returnDist} total={c.totalKm} />
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:7, marginBottom:10 }}>
            {[{ l:"Circuit Rev", v:`₹${f2(c.totalRev)}`, c:T.grn }, { l:"Total km", v:`${f2(c.totalKm)}km`, c:T.txt }, { l:"Circuit Days", v:`${c.circuitDays}d`, c:T.txt }, { l:"Trips/Truck/Mo", v:c.circuitsPerTruck, c:T.acc }, { l:`Trucks (${m})`, v:trucks, c:T.yel }].map(m2 => <div key={m2.l} style={{ background:T.surf, padding:"8px 10px", borderRadius:5 }}>
              <div style={{ fontSize:9, color:T.dim, textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:2 }}>{m2.l}</div>
              <div style={{ fontWeight:700, color:m2.c, fontSize:12 }}>{m2.v}</div>
            </div>)}
          </div>

          {/* ── PER-LEG FUEL PLAN ─────────────────────────────────────────────── */}
          <div style={{ marginBottom:12, padding:"12px 14px", background:"#04090f", border:`1px solid ${c.fuelOk ? T.grn+"33" : T.yel+"44"}`, borderRadius:6 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10, flexWrap:"wrap", gap:6 }}>
              <div style={{ fontWeight:700, fontSize:11, color:c.fuelOk ? T.grn : T.yel }}>
                ⛽ Fuel Plan — Loaded Legs Only
              </div>
              <div style={{ display:"flex", gap:7, alignItems:"center" }}>
                <span style={{ fontSize:10, color:T.dim }}>Total pump stops: <strong style={{ color:T.acc }}>{c.totalFuelStops}</strong></span>
                {c.fuelOk
                  ? <Pill col="green">All legs covered</Pill>
                  : <Pill col="yellow">⚠ {c.infraLegs.length} leg{c.infraLegs.length > 1 ? "s" : ""} without pump</Pill>}
              </div>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:`repeat(${c.legs.length}, 1fr)`, gap:8, marginBottom:8 }}>
              {c.legs.map((leg, li) => {
                const fuel = c.legFuel?.[li];
                const legOk = fuel?.ok;
                const stops = fuel?.stops || [];
                return <div key={li} style={{ background:T.panel, padding:"9px 11px", borderRadius:5, border:`1px solid ${legOk ? T.grn+"33" : T.yel+"44"}`, borderLeft:`3px solid ${legColors[li % 4]}` }}>
                  <div style={{ fontWeight:700, color:legColors[li % 4], fontSize:11, marginBottom:5 }}>
                    Leg {li+1}: {leg.origin?.placeName || leg.origin?.name} → {leg.dest?.placeName || leg.dest?.name}
                  </div>
                  <div style={{ fontSize:11, color:T.dim, lineHeight:1.8 }}>
                    <span>{f2(leg.dist)}km · {leg.vType === "LNG_DOUBLE" ? "Double tank" : "Single tank"}</span><br/>
                    {legOk
                      ? fuel.n === 0
                        ? <span style={{ color:T.grn }}>✓ Within range — no stop needed</span>
                        : <span style={{ color:T.grn }}>✓ {fuel.n} pump stop{fuel.n > 1 ? "s" : ""}: {stops.map(s => s.name).join(" → ")}</span>
                      : <span style={{ color:T.yel }}>⚠ No LNG pump on corridor — double tank or reroute via pump city</span>}
                  </div>
                </div>;
              })}
            </div>
            <div style={{ fontSize:10, color:T.dim, lineHeight:1.7 }}>
              <span style={{ color:T.grn }}>▬ Loaded legs: fuel planned above</span>
              {"  "}
              <span style={{ color:T.dim }}>▬ Dry run legs ({c.legs.length - 1} segments): empty vehicle — fueling at driver's discretion</span>
              {"  "}
              <span style={{ color:T.dim }}>▬ Return to depot: empty vehicle — fueling at driver's discretion</span>
            </div>
          </div>

          {/* ── INFRA RISK WARNING if any loaded leg has no pump ─────────────── */}
          {!c.fuelOk && c.verdict === "INFRA_RISK" && <div style={{ marginBottom:10, padding:"9px 12px", background:"rgba(245,158,11,.07)", border:`1px solid rgba(245,158,11,.3)`, borderRadius:5, fontSize:11, color:T.yel }}>
            ⚠ <strong>Infra Risk:</strong> Yield clears ₹{cfg.yieldThreshold}/km but {c.infraLegs.length === 1 ? "Leg " + (c.infraLegs[0]+1) + " has" : "Legs " + c.infraLegs.map(i=>i+1).join(", ") + " have"} no LNG pump along the corridor. Operate this circuit only after confirming pump availability or switching affected leg to double-tank vehicle.
          </div>}

          {/* Volume imbalance options */}
          {c.hasImbalance && <div style={{ padding:"12px 14px", background:"#07101e", border:`1px solid ${T.yel}33`, borderRadius:6 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10, flexWrap:"wrap", gap:7 }}>
              <div style={{ fontWeight:700, color:T.yel, fontSize:11 }}>⚖ Volume Imbalance — Choose Planning Option</div>
              <div style={{ display:"flex", gap:6 }}>
                <Btn v={m === "tight" ? "primary" : "ghost"} sm onClick={() => toggleMode(c.id)}>Tight ({c.tightCircuits} circuits)</Btn>
                <Btn v={m === "max"   ? "warn"    : "ghost"} sm onClick={() => toggleMode(c.id)}>Max ({c.maxCircuits} circuits)</Btn>
              </div>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <div style={{ padding:"10px 12px", background:m === "tight" ? "#0a1a10" : "#06101a", border:`1px solid ${m === "tight" ? T.grn + "44" : T.bdr}`, borderRadius:5 }}>
                <div style={{ fontWeight:700, color:T.grn, marginBottom:5, fontSize:11 }}>Option 1 — Tight</div>
                <div style={{ fontSize:11, color:T.dim, lineHeight:1.8 }}>
                  {c.tightCircuits} stitched circuits · {c.tightTrucks} trucks · -{c.trucksSavedTight} saved<br/>
                  {c.legs.map((l, li) => c.tightExcess[li] > 0 && <div key={li} style={{ color:T.yel }}>· L{li+1}: +{c.tightExcess[li]} standalone trips</div>)}
                </div>
              </div>
              <div style={{ padding:"10px 12px", background:m === "max" ? "#1a100a" : "#06101a", border:`1px solid ${m === "max" ? T.yel + "44" : T.bdr}`, borderRadius:5 }}>
                <div style={{ fontWeight:700, color:T.yel, marginBottom:5, fontSize:11 }}>Option 2 — Max</div>
                <div style={{ fontSize:11, color:T.dim, lineHeight:1.8 }}>
                  {c.maxCircuits} stitched circuits · {c.maxTrucks} trucks · -{c.trucksSavedMax} saved<br/>
                  {c.legs.map((l, li) => c.maxShortfall[li] > 0 && <div key={li} style={{ color:T.org }}>· L{li+1}: {c.maxShortfall[li]} trips under-utilised → spot/partial</div>)}
                </div>
              </div>
            </div>
          </div>}
          {saved > 0 && <div style={{ marginTop:9, padding:"7px 11px", background:"rgba(249,115,22,.07)", border:`1px solid rgba(249,115,22,.2)`, borderRadius:5, fontSize:11, color:T.org }}>🚛 Fleet saving ({m}): {saved} truck{saved > 1 ? "s" : ""} freed ({c.standaloneTrucks} → {trucks}).</div>}
        </div>;
      })}
    </>}
  </div>;
}

// ─── MONTHLY PLAN TAB ─────────────────────────────────────────────────────────
function MonthlyPlanTab({ lanes, cfg }) {
  if (!lanes.length) return <div style={{ textAlign:"center", padding:52, color:T.dim }}><div style={{ fontSize:34, marginBottom:10 }}>📅</div><div>Add lanes in Lane Master first.</div></div>;

  const totalTrips    = lanes.reduce((s, l) => s + (l.tripsPerMonth || 0), 0);
  const totalTruckDays = lanes.reduce((s, l) => s + (l.truckDays || 0), 0);
  const totalTrucks   = lanes.reduce((s, l) => s + (l.trucksNeeded || 0), 0);
  const totalRev      = lanes.reduce((s, l) => s + ((l.revPerTrip || 0) * (l.tripsPerMonth || 0)), 0);
  const totalLoaded   = lanes.reduce((s, l) => s + (l.loadedKm || 0) * (l.tripsPerMonth || 0), 0);
  const totalEmpty    = lanes.reduce((s, l) => s + (l.emptyKm  || 0) * (l.tripsPerMonth || 0), 0);
  const netYield      = totalLoaded + totalEmpty > 0 ? totalRev / (totalLoaded + totalEmpty) : 0;
  const loadFactor    = Math.round((totalLoaded / (totalLoaded + totalEmpty || 1)) * 100);

  const depotGroups = {};
  for (const l of lanes) {
    const dk = l.depot?.placeName || l.depot?.name || l.origin?.placeName || "Unknown";
    if (!depotGroups[dk]) depotGroups[dk] = [];
    depotGroups[dk].push(l);
  }

  return <div>
    <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:10, marginBottom:14 }}>
      <StatCard label="Total Trips/Mo"   value={f2(totalTrips)}   color={T.acc} />
      <StatCard label="Truck-Days/Mo"    value={f2(totalTruckDays)} color={T.txt} />
      <StatCard label="Trucks Required"  value={totalTrucks}       color={T.yel} />
      <StatCard label="Monthly Revenue"  value={`₹${f2(totalRev)}`} color={T.grn} />
      <StatCard label="Network Yield"    value={`₹${f1(netYield)}`} sub="/km avg" color={netYield >= cfg.yieldThreshold ? T.grn : T.yel} />
    </div>

    <div style={card()}>
      <div style={ttl()}>📦 Network km Summary</div>
      <KmBar loaded={totalLoaded} dryRun={0} returnKm={totalEmpty} total={totalLoaded + totalEmpty} />
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:9, marginTop:11 }}>
        {[{ l:"Loaded km/mo", v:`${f2(totalLoaded)}km`, c:T.grn }, { l:"Empty km/mo", v:`${f2(totalEmpty)}km`, c:T.red }, { l:"Load Factor", v:`${loadFactor}%`, c:loadFactor >= 70 ? T.grn : T.yel }].map(m => <div key={m.l} style={{ background:T.surf, padding:"9px 11px", borderRadius:5 }}>
          <div style={{ fontSize:9, color:T.dim, textTransform:"uppercase", marginBottom:2 }}>{m.l}</div>
          <div style={{ fontWeight:700, color:m.c, fontSize:13 }}>{m.v}</div>
        </div>)}
      </div>
    </div>

    {Object.entries(depotGroups).map(([depot, dLanes]) => {
      const dTrips  = dLanes.reduce((s, l) => s + (l.tripsPerMonth || 0), 0);
      const dTrucks = dLanes.reduce((s, l) => s + (l.trucksNeeded || 0), 0);
      const dRev    = dLanes.reduce((s, l) => s + ((l.revPerTrip || 0) * (l.tripsPerMonth || 0)), 0);
      return <div key={depot} style={card()}>
        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10, flexWrap:"wrap", gap:7 }}>
          <div style={ttl()}>🏠 {depot} · {dLanes.length} lanes</div>
          <div style={{ display:"flex", gap:10 }}>
            <span style={{ fontSize:11, color:T.acc }}>{dTrips} trips/mo</span>
            <span style={{ fontSize:11, color:T.yel }}>{dTrucks} trucks</span>
            <span style={{ fontSize:11, color:T.grn }}>₹{f2(dRev)}/mo</span>
          </div>
        </div>
        <div style={{ overflowX:"auto" }}><table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
          <thead><tr>{["Lane", "Route", "Type", "Mo T", "Trips/Mo", "Transit", "RT Days", "Truck-Days", "Trucks", "Rev/Trip", "Mo Rev", "Yield", "Verdict"].map(h => <TH key={h}>{h}</TH>)}</tr></thead>
          <tbody>{dLanes.map(l => <tr key={l.id}>
            <TD dim>{l.laneId}</TD>
            <TD bold color={T.acc}>{l.origin?.placeName || l.origin?.name} → {l.dest?.placeName || l.dest?.name}</TD>
            <TD><Pill col={l.laneType === "PROBABLE" ? "purple" : "blue"}>{l.laneType || "EX"}</Pill></TD>
            <TD>{f2(l.monthlyTonnes)}T</TD>
            <TD bold color={T.acc}>{l.tripsPerMonth}</TD>
            <TD>{l.transitDays}d</TD>
            <TD>{l.rtDays}d</TD>
            <TD color={T.yel}>{l.truckDays}</TD>
            <TD bold color={T.yel}>{l.trucksNeeded}</TD>
            <TD color={T.grn}>₹{f2(l.revPerTrip)}</TD>
            <TD bold color={T.grn}>₹{f2((l.revPerTrip || 0) * (l.tripsPerMonth || 0))}</TD>
            <TD><YieldBar value={l.yieldKm || 0} threshold={cfg.yieldThreshold} /></TD>
            <TD><VP v={l.verdict} /></TD>
          </tr>)}</tbody>
        </table></div>
      </div>;
    })}
    <div style={{ display:"flex", justifyContent:"flex-end", marginTop:4 }}>
      <Btn v="primary" onClick={() => exportCSV(lanes.map(l => [l.laneId, l.origin?.placeName || l.origin?.name, l.dest?.placeName || l.dest?.name, l.depot?.placeName || l.depot?.name || "", l.laneType || "", l.customer || "", l.monthlyTonnes, cfg.capacity, l.tripsPerMonth, l.transitDays, l.rtDays, l.truckDays, l.trucksNeeded, l.revPerTrip, (l.revPerTrip || 0) * (l.tripsPerMonth || 0), l.yieldKm, l.verdict]), ["Lane", "Origin", "Dest", "Depot", "Type", "Customer", "Mo T", "Cap/Trip", "Trips/Mo", "Transit", "RT Days", "Truck-Days", "Trucks", "Rev/Trip", "Mo Rev", "Yield", "Verdict"], "monthly_plan")}>⬇ Export Full Plan</Btn>
    </div>
  </div>;
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [tab,    setTab]    = React.useState("config");
  const [cfg,    setCfg]    = React.useState(DEF_CFG);
  const [lanes,  setLanes]  = React.useState([]);
  const [status, setStatus] = React.useState("");

  const TABS = [
    { id:"config",  ic:"⚙",  l:"Config" },
    { id:"master",  ic:"📥", l:`Lane Master${lanes.length ? ` (${lanes.length})` : ""}` },
    { id:"yield",   ic:"📊", l:"Yield Analysis" },
    { id:"stitch",  ic:"🔗", l:"Stitch Engine" },
    { id:"plan",    ic:"📅", l:"Monthly Plan" },
  ];

  return <div style={{ fontFamily:"inherit", background:T.bg, minHeight:"100vh", color:T.txt, fontSize:13 }}>
    {/* HEADER */}
    <div style={{ background:"linear-gradient(90deg,#020406,#050c18)", borderBottom:`1px solid ${T.bdr}`, padding:"11px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
      <div style={{ display:"flex", alignItems:"center", gap:11 }}>
        <div style={{ width:36, height:36, background:`linear-gradient(135deg,${T.acc},#1e40af)`, borderRadius:9, display:"flex", alignItems:"center", justifyContent:"center", fontSize:19 }}>🛣</div>
        <div>
          <div style={{ fontSize:17, fontWeight:800, color:T.acc, letterSpacing:"0.04em", lineHeight:1 }}>NETPLAN PRO v4</div>
          <div style={{ fontSize:9, color:T.dim, letterSpacing:"0.12em", textTransform:"uppercase", marginTop:2 }}>MapmyIndia · Vercel KV Cache · N-Leg Circuits · Per-Lane Depots</div>
        </div>
      </div>
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
        <Pill col="blue">₹{cfg.yieldThreshold}/km</Pill>
        <Pill col="orange">{cfg.maxLegs}-leg circuits</Pill>
        <Pill col="yellow">{cfg.maxDryRun}km dry run</Pill>
        <Pill col="grey">{cfg.maxReturnKm}km max return</Pill>
        {lanes.length > 0 && <Pill col="green">{lanes.length} lanes · {[...new Set(lanes.map(l => l.depot?.placeName || l.depot?.name || l.origin?.placeName))].length} depots</Pill>}
        {status && <span style={{ fontSize:10, color:status.startsWith("✓") ? T.grn : status.startsWith("⚠") ? T.red : T.yel }}>{status}</span>}
      </div>
    </div>

    {/* TABS */}
    <div style={{ display:"flex", background:"#030609", borderBottom:`1px solid ${T.bdr}`, padding:"0 16px", overflowX:"auto" }}>
      {TABS.map(t => <button key={t.id} onClick={() => setTab(t.id)} style={{ padding:"11px 16px", fontSize:11, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", cursor:"pointer", border:"none", borderBottom:tab === t.id ? `2px solid ${T.acc}` : "2px solid transparent", background:"transparent", color:tab === t.id ? T.acc : T.dim, fontFamily:"inherit", whiteSpace:"nowrap" }}>{t.ic} {t.l}</button>)}
    </div>

    {/* BODY */}
    <div style={{ padding:"16px 20px", maxWidth:1440, margin:"0 auto" }}>
      {tab === "config" && <ConfigTab cfg={cfg} setCfg={setCfg} />}
      {tab === "master" && <LaneMasterTab lanes={lanes} setLanes={setLanes} cfg={cfg} setStatus={setStatus} />}
      {tab === "yield"  && <YieldTab lanes={lanes} cfg={cfg} />}
      {tab === "stitch" && <StitchTab lanes={lanes} cfg={cfg} />}
      {tab === "plan"   && <MonthlyPlanTab lanes={lanes} cfg={cfg} />}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
