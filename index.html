      // Step 3: fuel plan for standalone (loaded, strict)
      const standaloneFuel = planFuelLeg(form.origin.lat, form.origin.lng, form.dest.lat, form.dest.lng, dist, vType, cfg, true);

      // Step 4: find best circuit from master
      setProgress("Searching master circuits for best fit…");
      let bestFit = null;
      if (!noMaster) {
        bestFit = await findBestCircuitForLane(newLane, masterCircuits, cfg, setProgress);
      }

      // Step 5: rate advisory
      let rateAdvisory = null;
      if (bestFit) {
        const newLegIdx = bestFit.legs.findIndex(l => l.id === "NEW_LANE");
        rateAdvisory = reverseEngineerRate(bestFit.legs, bestFit.connDists, bestFit.returnDist, newLegIdx, cfg.yieldThreshold, cfg.capacity);
      } else if (dist > 0) {
        // No master circuit — standalone min rate
        const minStandaloneRev = cfg.yieldThreshold * dist * 2;
        rateAdvisory = { minRate: Math.ceil(minStandaloneRev / cfg.capacity / 10) * 10, neededRev: Math.round(minStandaloneRev), totalKm: dist * 2, otherRev: 0 };
      }

      // Final verdict
      let finalVerdict, verdictNote;
      if (bestFit) {
        const cy = bestFit.cy;
        finalVerdict = cy.yieldKm >= cfg.yieldThreshold && cy.fuelOk ? "OPERATE_WITH_STITCH"
          : cy.yieldKm >= cfg.yieldThreshold && !cy.fuelOk ? "INFRA_RISK_WITH_STITCH"
          : cy.yieldKm >= cfg.yieldThreshold * 0.8 ? "MARGINAL_WITH_STITCH"
          : "DROP_EVEN_WITH_STITCH";
        verdictNote = `Best circuit yield: ₹${cy.yieldKm}/km on ${bestFit.legs.length}-leg circuit`;
      } else if (noMaster) {
        finalVerdict = "NO_MASTER";
        verdictNote = "Run Master Circuits first and Lock as Master to enable full analysis";
      } else {
        finalVerdict = standaloneVerdict === "OPERATE" ? "OPERATE_STANDALONE" : "DROP_NO_CIRCUIT";
        verdictNote = "No matching circuit found in master — standalone evaluation only";
      }

      setResult({ newLane, dist, vType, standaloneYield, standaloneVerdict, standaloneFuel, bestFit, rateAdvisory, finalVerdict, verdictNote });
    } catch (e) {
      setProgress("Error: " + e.message);
    } finally {
      setLoading(false);
    }
  };

  // Verdict styling
  const vStyle = v => ({
    OPERATE_WITH_STITCH:    { col:"#10b981", bg:"rgba(16,185,129,.1)", label:"✓ OPERATE WITH STITCH" },
    OPERATE_STANDALONE:     { col:"#10b981", bg:"rgba(16,185,129,.07)", label:"✓ OPERATE (standalone viable)" },
    INFRA_RISK_WITH_STITCH: { col:"#f59e0b", bg:"rgba(245,158,11,.08)", label:"⚠ INFRA RISK (pump gap on stitched circuit)" },
    MARGINAL_WITH_STITCH:   { col:"#f59e0b", bg:"rgba(245,158,11,.08)", label:"≈ MARGINAL WITH STITCH" },
    DROP_EVEN_WITH_STITCH:  { col:"#ef4444", bg:"rgba(239,68,68,.08)",  label:"✗ DROP EVEN WITH STITCH" },
    DROP_NO_CIRCUIT:        { col:"#ef4444", bg:"rgba(239,68,68,.08)",  label:"✗ DROP — No viable circuit found" },
    NO_MASTER:              { col:"#94a3b8", bg:"rgba(148,163,184,.05)", label:"⏳ Lock master circuits first" },
    NO_RATE:                { col:"#94a3b8", bg:"rgba(148,163,184,.05)", label:"Enter rate to get verdict" },
  }[v] || { col:T.dim, bg:"transparent", label:v });

  const segColor = { loaded:T.grn, ferry:T.org, return:`${T.red}88` };
  const segLabel = { loaded:"● LOADED", ferry:"○ EMPTY FERRY", return:"○ RETURN" };

  return <div>
    {/* ── INPUT FORM ─────────────────────────────────────────────────────────── */}
    <div style={{ ...card(), background:"#060d1a", border:`1px solid ${T.acc}22`, marginBottom:14 }}>
      <div style={ttl()}>🔍 Rate Advisor — New Lane Evaluation</div>
      {noMaster && <div style={{ marginBottom:12, padding:"9px 12px", background:"rgba(245,158,11,.07)", border:`1px solid rgba(245,158,11,.3)`, borderRadius:5, fontSize:11, color:T.yel }}>
        ⚠ No master circuits loaded. Go to <strong>🔗 Circuits</strong> → run stitching → click <strong>🔒 Lock as Master</strong>. Then come back here to evaluate new lanes against existing circuits.
      </div>}
      {masterIsStale && !noMaster && <div style={{ marginBottom:12, padding:"9px 12px", background:"rgba(245,158,11,.07)", border:`1px solid rgba(245,158,11,.3)`, borderRadius:5, fontSize:11, color:T.yel }}>
        ⚠ Master circuits are stale — lanes or stations changed since last lock. Results are based on the previous master. Re-run 🔗 Circuits and lock again for accurate advice.
      </div>}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:12 }}>
        <LocSearch label="Origin" value={form.origin} onSelect={v => sf("origin", v)} />
        <LocSearch label="Destination" value={form.dest} onSelect={v => sf("dest", v)} />
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:12, marginBottom:12 }}>
        <div>
          <label style={lbl()}>Customer Name</label>
          <input value={form.customer} onChange={e => sf("customer", e.target.value)} placeholder="e.g. Tata Steel" style={inp()} />
        </div>
        <div>
          <label style={lbl()}>Volume (T/month)</label>
          <input type="number" value={form.monthlyTonnes} onChange={e => sf("monthlyTonnes", e.target.value)} style={inp()} />
        </div>
        <div>
          <label style={lbl()}>Rate being considered (₹/T) <span style={{ color:T.dim }}>(optional)</span></label>
          <input type="number" value={form.rate} onChange={e => sf("rate", e.target.value)} placeholder="0 = just show min rate" style={inp()} />
        </div>
        <div>
          <label style={lbl()}>Vehicle Type</label>
          <select value={form.vType} onChange={e => sf("vType", e.target.value)} style={{ ...inp(), cursor:"pointer" }}>
            {["AUTO","LNG_SINGLE","LNG_DOUBLE"].map(v => <option key={v} value={v}>{v}</option>)}
          </select>
        </div>
      </div>
      <div style={{ display:"flex", gap:10, alignItems:"center" }}>
        <Btn v="primary" onClick={evaluate} disabled={!form.origin || !form.dest || loading}>
          {loading ? `⏳ ${progress}` : "🔍 Evaluate Lane"}
        </Btn>
        {!noMaster && <span style={{ fontSize:10, color:T.grn }}>🔒 {masterCircuits.length} master circuits loaded</span>}
      </div>
    </div>

    {/* ── RESULTS ────────────────────────────────────────────────────────────── */}
    {result && (() => {
      const { newLane, dist, vType, standaloneYield, standaloneVerdict, standaloneFuel, bestFit, rateAdvisory, finalVerdict, verdictNote } = result;
      const vs = vStyle(finalVerdict);
      const oName = newLane.origin?.placeName || newLane.origin?.name || "";
      const dName = newLane.dest?.placeName   || newLane.dest?.name   || "";

      return <>
        {/* ── VERDICT BANNER ──────────────────────────────────────────────── */}
        <div style={{ ...card(), background:vs.bg, border:`2px solid ${vs.col}44`, marginBottom:14 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:10 }}>
            <div>
              <div style={{ fontSize:22, fontWeight:800, color:vs.col, marginBottom:4 }}>{vs.label}</div>
              <div style={{ fontSize:12, color:T.dim }}>{oName} → {dName} · {f2(dist)}km · {newLane.customer}</div>
              <div style={{ fontSize:11, color:T.sub, marginTop:4 }}>{verdictNote}</div>
            </div>
            {rateAdvisory && <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:9, color:T.dim, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:3 }}>Min Rate to Quote</div>
              <div style={{ fontSize:32, fontWeight:900, color:T.acc }}>₹{f2(rateAdvisory.minRate)}<span style={{ fontSize:14, color:T.dim }}>/T</span></div>
              <div style={{ fontSize:10, color:T.dim }}>to hit ₹{cfg.yieldThreshold}/km on {bestFit ? "stitched circuit" : "standalone RT"}</div>
              {parseFloat(form.rate) > 0 && <div style={{ fontSize:11, marginTop:4, color: parseFloat(form.rate) >= rateAdvisory.minRate ? T.grn : T.red, fontWeight:700 }}>
                {parseFloat(form.rate) >= rateAdvisory.minRate ? `✓ ₹${form.rate}/T is viable` : `✗ ₹${form.rate}/T is ₹${rateAdvisory.minRate - form.rate}/T short`}
              </div>}
            </div>}
          </div>
        </div>

        {/* ── STANDALONE vs STITCH COMPARISON ────────────────────────────── */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:14 }}>
          <div style={{ ...card(), borderLeft:`3px solid ${standaloneVerdict === "OPERATE" ? T.grn : T.red}` }}>
            <div style={{ fontSize:9, color:T.dim, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:8, fontWeight:700 }}>📊 Standalone (One-Way + Empty Return)</div>
            <div style={{ fontSize:24, fontWeight:800, color:standaloneVerdict === "OPERATE" ? T.grn : standaloneVerdict === "MARGINAL" ? T.yel : T.red, marginBottom:6 }}>
              {newLane.yieldKm > 0 ? `₹${f1(standaloneYield)}/km` : "No rate entered"}
            </div>
            <div style={{ fontSize:11, color:T.dim, lineHeight:1.8 }}>
              {f2(dist)}km one-way · {f2(dist * 2)}km round trip<br/>
              Rev/trip: ₹{f2(newLane.revPerTrip)} · Load factor: 50% (empty return)<br/>
              <span style={{ color:T.red, fontWeight:700 }}>This is why standalone is always DROP on one-way lanes.</span>
            </div>
            {standaloneFuel.n > 0 && <div style={{ marginTop:8, fontSize:10, color:T.grn }}>
              ⛽ Pump stops: {standaloneFuel.stops?.map(s => `${s.name}${s.diversionKm > 0 ? ` (+${s.diversionKm}km)` : ""}`).join(" → ")}
            </div>}
          </div>

          <div style={{ ...card(), borderLeft:`3px solid ${vs.col}` }}>
            <div style={{ fontSize:9, color:T.dim, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:8, fontWeight:700 }}>🔗 With Best Circuit Stitch</div>
            {bestFit ? <>
              <div style={{ fontSize:24, fontWeight:800, color:vs.col, marginBottom:6 }}>₹{f1(bestFit.cy.yieldKm)}/km</div>
              <div style={{ fontSize:11, color:T.dim, lineHeight:1.8 }}>
                {bestFit.legs.length}-leg circuit · {f2(bestFit.cy.totalKm)}km total · {bestFit.cy.loadPct}% loaded<br/>
                Circuit rev: ₹{f2(bestFit.cy.totalRev)} · Days/circuit: {bestFit.cy.circuitDays}d<br/>
                <span style={{ color:T.grn }}>Load factor improves from 50% → {bestFit.cy.loadPct}%</span>
              </div>
            </> : <div style={{ fontSize:13, color:T.dim, paddingTop:10 }}>
              {noMaster ? "Lock master circuits to enable this analysis" : "No viable circuit found in master lanes"}
            </div>}
          </div>
        </div>

        {/* ── BEST CIRCUIT FULL JOURNEY MAP ───────────────────────────────── */}
        {bestFit && (() => {
          const cy = bestFit.cy;
          const depot = bestFit.legs[0].depot || bestFit.legs[0].origin;
          const segs  = [];
          bestFit.legs.forEach((leg, li) => {
            segs.push({ type:"loaded", from: leg.origin?.placeName||leg.origin?.name, to: leg.dest?.placeName||leg.dest?.name, km: leg.dist, customer: leg.customer||"", revenue: leg.revPerTrip, fuel: cy.legFuel?.[li], isNew: leg.id === "NEW_LANE" });
            if (li < bestFit.legs.length - 1)
              segs.push({ type:"ferry", from: leg.dest?.placeName||leg.dest?.name, to: bestFit.legs[li+1].origin?.placeName||bestFit.legs[li+1].origin?.name, km: bestFit.connDists[li], fuel: cy.ferryFuel?.[li] });
          });
          segs.push({ type:"return", from: bestFit.legs[bestFit.legs.length-1].dest?.placeName||bestFit.legs[bestFit.legs.length-1].dest?.name, to: depot?.placeName||depot?.name, km: bestFit.returnDist, fuel: cy.retFuel });

          return <div style={{ ...card(), background:"#030810", border:`1px solid ${vs.col}22` }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, flexWrap:"wrap", gap:8 }}>
              <div style={ttl()}>🗺 Full Journey Map — Best Matching Circuit</div>
              <div style={{ display:"flex", gap:6 }}>
                <Pill col={finalVerdict.includes("OPERATE") ? "green" : finalVerdict.includes("MARGINAL") ? "yellow" : "red"}>{vs.label}</Pill>
                <Pill col={cy.loadPct >= 65 ? "green" : "yellow"}>{cy.loadPct}% loaded</Pill>
              </div>
            </div>

            {/* Journey node chain */}
            <div style={{ display:"flex", alignItems:"center", flexWrap:"wrap", gap:0, marginBottom:14, padding:"10px 12px", background:"#040b16", borderRadius:7 }}>
              <div style={{ padding:"5px 10px", background:`${T.yel}18`, border:`1px solid ${T.yel}44`, borderRadius:5, fontSize:11, fontWeight:800, color:T.yel }}>🏠 {bestFit.depotName}</div>
              {segs.map((seg, si) => <React.Fragment key={si}>
                <div style={{ display:"flex", flexDirection:"column", alignItems:"center", padding:"0 5px", minWidth:55 }}>
                  <div style={{ fontSize:8, color:seg.isNew ? T.acc : segColor[seg.type], letterSpacing:"0.06em", fontWeight:700, marginBottom:2 }}>{seg.isNew ? "★ NEW" : segLabel[seg.type]}</div>
                  <div style={{ height:3, width:"100%", minWidth:35, background:seg.isNew ? T.acc : segColor[seg.type], opacity:0.7, borderRadius:2 }} />
                  <div style={{ fontSize:10, color:seg.isNew ? T.acc : segColor[seg.type], fontWeight:700, marginTop:2 }}>{f2(seg.km)}km</div>
                  {seg.type === "loaded" && <div style={{ fontSize:9, color:T.grn, marginTop:1 }}>₹{f2(seg.revenue)}</div>}
                  {seg.type === "loaded" && seg.customer && <div style={{ fontSize:9, color: seg.isNew ? T.acc : T.sub, marginTop:1, maxWidth:80, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", textAlign:"center", fontWeight:seg.isNew?700:400 }} title={seg.customer}>{seg.customer}</div>}
                </div>
                <div style={{ padding:"5px 8px", background:seg.isNew ? `${T.acc}20` : seg.type==="loaded" ? `${T.grn}10` : `${T.dim}10`, border:`1px solid ${seg.isNew ? T.acc+"55" : seg.type==="loaded" ? T.grn+"22" : "#1a2a3a"}`, borderRadius:5, fontSize:11, fontWeight:seg.type==="loaded"?700:400, color:seg.isNew?T.acc:seg.type==="loaded"?T.txt:T.sub }}>
                  {seg.to}
                </div>
              </React.Fragment>)}
            </div>

            {/* km bar */}
            <div style={{ marginBottom:14 }}>
              <div style={{ display:"flex", height:8, borderRadius:4, overflow:"hidden", gap:1, marginBottom:5 }}>
                {segs.map((s, si) => <div key={si} style={{ flex:Math.max(s.km,1), background:s.isNew?T.acc:s.type==="loaded"?T.grn:s.type==="ferry"?T.org:`${T.red}66` }} />)}
              </div>
              <div style={{ display:"flex", gap:12, fontSize:10, flexWrap:"wrap" }}>
                <span style={{ color:T.acc }}>★ New lane: {f2(newLane.dist)}km</span>
                <span style={{ color:T.grn }}>▬ Other loaded: {f2(cy.loadedKm - newLane.dist)}km</span>
                {cy.ferryKm > 0 && <span style={{ color:T.org }}>▬ Ferry: {f2(cy.ferryKm)}km</span>}
                <span style={{ color:T.red }}>▬ Return: {f2(cy.returnDist)}km</span>
                <span style={{ color:T.dim }}>Total: {f2(cy.totalKm)}km</span>
              </div>
            </div>

            {/* ⛽ Per-segment fuel plan */}
            <div style={{ padding:"12px 14px", background:"#04090f", border:`1px solid ${cy.fuelOk ? T.grn+"33" : T.yel+"44"}`, borderRadius:6 }}>
              <div style={{ fontWeight:700, fontSize:11, color:cy.fuelOk ? T.grn : T.yel, marginBottom:10 }}>⛽ LNG Fuel Plan — Full Circuit</div>
              <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                {segs.map((seg, si) => {
                  const fuel = seg.fuel;
                  if (!fuel) return null;
                  const isLoaded = seg.type === "loaded";
                  return <div key={si} style={{ padding:"8px 11px", background:T.panel, borderRadius:5, borderLeft:`3px solid ${seg.isNew ? T.acc : segColor[seg.type]}` }}>
                    <div style={{ display:"flex", alignItems:"flex-start", gap:10, flexWrap:"wrap" }}>
                      <div style={{ minWidth:85, fontSize:9, color:seg.isNew ? T.acc : segColor[seg.type], fontWeight:700, textTransform:"uppercase", letterSpacing:"0.06em", flexShrink:0 }}>{seg.isNew ? "★ NEW LEG" : segLabel[seg.type]}</div>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:11, color:T.txt, marginBottom:3 }}>
                          <strong>{seg.from}</strong> → <strong>{seg.to}</strong>
                          <span style={{ color:T.dim, marginLeft:8 }}>{f2(seg.km)}km</span>
                          {isLoaded && seg.customer && <span style={{ marginLeft:10, color:seg.isNew ? T.acc : T.sub, fontWeight:700 }}>📦 {seg.customer}</span>}
                        </div>
                        {fuel.n > 0 && <div style={{ display:"flex", gap:5, flexWrap:"wrap", marginBottom:4 }}>
                          {fuel.stops?.map((s, si2) => <div key={si2} style={{ display:"flex", gap:4, padding:"2px 7px", background:`${T.acc}12`, border:`1px solid ${T.acc}33`, borderRadius:4, fontSize:10 }}>
                            <span style={{ color:T.acc }}>⛽ {s.name}</span>
                            <span style={{ color:T.dim }}>({s.nh})</span>
                            {s.diversionKm > 0 && <span style={{ color:T.yel, fontWeight:700 }}>+{s.diversionKm}km</span>}
                            {s.diversionKm === 0 && <span style={{ color:T.grn }}>on route</span>}
                          </div>)}
                        </div>}
                        <div style={{ fontSize:10, color:T.dim }}>
                          {isLoaded
                            ? fuel.ok
                              ? fuel.n === 0 ? <span style={{ color:T.grn }}>✓ Within range</span>
                                : <span style={{ color:T.grn }}>✓ {fuel.n} stop{fuel.n>1?"s":""} · diversion {fuel.totalDiversion||0}km</span>
                              : <span style={{ color:T.yel }}>⚠ No pump on corridor — switch to double tank</span>
                            : fuel.advisory
                              ? <span style={{ color:T.yel }}>⚠ Empty vehicle detours to pump</span>
                              : fuel.n > 0
                                ? <span style={{ color:T.sub }}>⛽ {fuel.n} stop{fuel.n>1?"s":""} · diversion {fuel.totalDiversion||0}km</span>
                                : <span style={{ color:T.sub }}>✓ Within range</span>}
                        </div>
                      </div>
                    </div>
                  </div>;
                })}
              </div>
            </div>
          </div>;
        })()}

        {/* ── Rate advisory breakdown ──────────────────────────────────────── */}
        {rateAdvisory && <div style={{ ...card(), marginTop:14 }}>
          <div style={ttl()}>💰 Rate Advisory Breakdown</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, marginBottom:12 }}>
            {[
              { l:"Min Rate to Quote",  v:`₹${f2(rateAdvisory.minRate)}/T`,     c:T.acc },
              { l:"Total Circuit km",  v:`${f2(rateAdvisory.totalKm)}km`,        c:T.txt },
              { l:"Other Legs Revenue", v:`₹${f2(rateAdvisory.otherRev)}`,       c:T.grn },
              { l:"New Lane Min Rev",  v:`₹${f2(rateAdvisory.neededRev)}`,       c:T.yel },
            ].map(x => <div key={x.l} style={{ background:T.surf, padding:"10px 12px", borderRadius:5 }}>
              <div style={{ fontSize:9, color:T.dim, textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:3 }}>{x.l}</div>
              <div style={{ fontSize:16, fontWeight:800, color:x.c }}>{x.v}</div>
            </div>)}
          </div>
          <div style={{ fontSize:11, color:T.dim, lineHeight:2, padding:"9px 12px", background:"#040a14", borderRadius:5 }}>
            <strong style={{ color:T.txt }}>How this is calculated:</strong><br/>
            Target yield × Total circuit km = Total revenue needed<br/>
            ₹{cfg.yieldThreshold}/km × {f2(rateAdvisory.totalKm)}km = ₹{f2(cfg.yieldThreshold * rateAdvisory.totalKm)}<br/>
            Minus other legs revenue: ₹{f2(rateAdvisory.otherRev)}<br/>
            New lane must generate: ₹{f2(rateAdvisory.neededRev)} = <strong style={{ color:T.acc }}>₹{f2(rateAdvisory.minRate)}/T × {cfg.capacity}T = ₹{f2(rateAdvisory.minRate * cfg.capacity)}/trip</strong>
          </div>
        </div>}
      </>;
    })()}
  </div>;
}

function MonthlyPlanTab({ lanes, cfg }) {
  if (!lanes.length) return <div style={{ textAlign:"center", padding:52, color:T.dim }}><div style={{ fontSize:34, marginBottom:10 }}>📅</div><div>Add lanes in Lane Master first.</div></div>;

  const totalTrips    = lanes.reduce((s, l) => s + (l.tripsPerMonth || 0), 0);
  const totalTruckDays = lanes.reduce((s, l) => s + (l.truckDays || 0), 0);
  const totalTrucks   = lanes.reduce((s, l) => s + (l.trucksNeeded || 0), 0);
  const totalRev      = lanes.reduce((s, l) => s + ((l.revPerTrip || 0) * (l.tripsPerMonth || 0)), 0);
  const totalLoaded   = lanes.reduce((s, l) => s + (l.loadedKm || 0) * (l.tripsPerMonth || 0), 0);
  const totalEmpty    = lanes.reduce((s, l) => s + (l.emptyKm  || 0) * (l.tripsPerMonth || 0), 0);
  const netYield      = totalLoaded + totalEmpty > 0 ? totalRev / (totalLoaded + totalEmpty) : 0;
  const loadFactor    = Math.round((totalLoaded / (totalLoaded + totalEmpty || 1)) * 100);

  const depotGroups = {};
  for (const l of lanes) {
    const dk = l.depot?.placeName || l.depot?.name || l.origin?.placeName || "Unknown";
    if (!depotGroups[dk]) depotGroups[dk] = [];
    depotGroups[dk].push(l);
  }

  return <div>
    <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:10, marginBottom:14 }}>
      <StatCard label="Total Trips/Mo"   value={f2(totalTrips)}   color={T.acc} />
      <StatCard label="Truck-Days/Mo"    value={f2(totalTruckDays)} color={T.txt} />
      <StatCard label="Trucks Required"  value={totalTrucks}       color={T.yel} />
      <StatCard label="Monthly Revenue"  value={`₹${f2(totalRev)}`} color={T.grn} />
      <StatCard label="Network Yield"    value={`₹${f1(netYield)}`} sub="/km avg" color={netYield >= cfg.yieldThreshold ? T.grn : T.yel} />
    </div>

    <div style={card()}>
      <div style={ttl()}>📦 Network km Summary</div>
      <KmBar loaded={totalLoaded} dryRun={0} returnKm={totalEmpty} total={totalLoaded + totalEmpty} />
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:9, marginTop:11 }}>
        {[{ l:"Loaded km/mo", v:`${f2(totalLoaded)}km`, c:T.grn }, { l:"Empty km/mo", v:`${f2(totalEmpty)}km`, c:T.red }, { l:"Load Factor", v:`${loadFactor}%`, c:loadFactor >= 70 ? T.grn : T.yel }].map(m => <div key={m.l} style={{ background:T.surf, padding:"9px 11px", borderRadius:5 }}>
          <div style={{ fontSize:9, color:T.dim, textTransform:"uppercase", marginBottom:2 }}>{m.l}</div>
          <div style={{ fontWeight:700, color:m.c, fontSize:13 }}>{m.v}</div>
        </div>)}
      </div>
    </div>

    {Object.entries(depotGroups).map(([depot, dLanes]) => {
      const dTrips  = dLanes.reduce((s, l) => s + (l.tripsPerMonth || 0), 0);
      const dTrucks = dLanes.reduce((s, l) => s + (l.trucksNeeded || 0), 0);
      const dRev    = dLanes.reduce((s, l) => s + ((l.revPerTrip || 0) * (l.tripsPerMonth || 0)), 0);
      return <div key={depot} style={card()}>
        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10, flexWrap:"wrap", gap:7 }}>
          <div style={ttl()}>🏠 {depot} · {dLanes.length} lanes</div>
          <div style={{ display:"flex", gap:10 }}>
            <span style={{ fontSize:11, color:T.acc }}>{dTrips} trips/mo</span>
            <span style={{ fontSize:11, color:T.yel }}>{dTrucks} trucks</span>
            <span style={{ fontSize:11, color:T.grn }}>₹{f2(dRev)}/mo</span>
          </div>
        </div>
        <div style={{ overflowX:"auto" }}><table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
          <thead><tr>{["Lane", "Route", "Type", "Mo T", "Trips/Mo", "Transit", "RT Days", "Truck-Days", "Trucks", "Rev/Trip", "Mo Rev", "Yield", "Verdict"].map(h => <TH key={h}>{h}</TH>)}</tr></thead>
          <tbody>{dLanes.map(l => <tr key={l.id}>
            <TD dim>{l.laneId}</TD>
            <TD bold color={T.acc}>{l.origin?.placeName || l.origin?.name} → {l.dest?.placeName || l.dest?.name}</TD>
            <TD><Pill col={l.laneType === "PROBABLE" ? "purple" : "blue"}>{l.laneType || "EX"}</Pill></TD>
            <TD>{f2(l.monthlyTonnes)}T</TD>
            <TD bold color={T.acc}>{l.tripsPerMonth}</TD>
            <TD>{l.transitDays}d</TD>
            <TD>{l.rtDays}d</TD>
            <TD color={T.yel}>{l.truckDays}</TD>
            <TD bold color={T.yel}>{l.trucksNeeded}</TD>
            <TD color={T.grn}>₹{f2(l.revPerTrip)}</TD>
            <TD bold color={T.grn}>₹{f2((l.revPerTrip || 0) * (l.tripsPerMonth || 0))}</TD>
            <TD><YieldBar value={l.yieldKm || 0} threshold={cfg.yieldThreshold} /></TD>
            <TD><VP v={l.verdict} /></TD>
          </tr>)}</tbody>
        </table></div>
      </div>;
    })}
    <div style={{ display:"flex", justifyContent:"flex-end", marginTop:4 }}>
      <Btn v="primary" onClick={() => exportCSV(lanes.map(l => [l.laneId, l.origin?.placeName || l.origin?.name, l.dest?.placeName || l.dest?.name, l.depot?.placeName || l.depot?.name || "", l.laneType || "", l.customer || "", l.monthlyTonnes, cfg.capacity, l.tripsPerMonth, l.transitDays, l.rtDays, l.truckDays, l.trucksNeeded, l.revPerTrip, (l.revPerTrip || 0) * (l.tripsPerMonth || 0), l.yieldKm, l.verdict]), ["Lane", "Origin", "Dest", "Depot", "Type", "Customer", "Mo T", "Cap/Trip", "Trips/Mo", "Transit", "RT Days", "Truck-Days", "Trucks", "Rev/Trip", "Mo Rev", "Yield", "Verdict"], "monthly_plan")}>⬇ Export Full Plan</Btn>
    </div>
  </div>;
}

// ─── STATION MASTER TAB ───────────────────────────────────────────────────────
function StationMasterTab({ stations, setStations }) {
  const [editId,  setEditId]  = React.useState(null);
  const [form,    setForm]    = React.useState({ name:"", lat:"", lng:"", nh:"", active:true });
  const [adding,  setAdding]  = React.useState(false);
  const [search,  setSearch]  = React.useState("");
  const sf = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const activeCount = stations.filter(s => s.active).length;

  const startEdit = s => { setEditId(s.id); setAdding(false); setForm({ name:s.name, lat:String(s.lat), lng:String(s.lng), nh:s.nh, active:s.active }); };
  const cancelEdit = () => { setEditId(null); setAdding(false); setForm({ name:"", lat:"", lng:"", nh:"", active:true }); };

  const saveEdit = () => {
    if (!form.name || !form.lat || !form.lng) return;
    setStations(ss => ss.map(s => s.id === editId
      ? { ...s, name:form.name.trim(), lat:parseFloat(form.lat), lng:parseFloat(form.lng), nh:form.nh.trim().toUpperCase(), active:form.active }
      : s));
    cancelEdit();
  };

  const saveNew = () => {
    if (!form.name || !form.lat || !form.lng) return;
    const newId = "S" + String(Date.now()).slice(-4);
    setStations(ss => [...ss, { id:newId, name:form.name.trim(), lat:parseFloat(form.lat), lng:parseFloat(form.lng), nh:form.nh.trim().toUpperCase()||"NH?", active:true }]);
    cancelEdit();
  };

  const toggleActive = id => setStations(ss => ss.map(s => s.id === id ? { ...s, active:!s.active } : s));
  const deleteStation = id => { if (window.confirm("Delete this station?")) setStations(ss => ss.filter(s => s.id !== id)); };
  const resetToDefault = () => { if (window.confirm("Reset all stations to defaults?")) setStations(DEFAULT_LNG_STNS); };

  const filtered = stations.filter(s => !search || s.name.toLowerCase().includes(search.toLowerCase()) || s.nh.toLowerCase().includes(search.toLowerCase()));

  const inpS = () => ({ ...inp(), padding:"6px 9px", fontSize:12 });

  return <div>
    {/* Header */}
    <div style={{ ...card(), background:"#060d1a", border:`1px solid ${T.acc}22`, marginBottom:14 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10 }}>
        <div>
          <div style={ttl()}>⛽ LNG Station Master</div>
          <div style={{ fontSize:11, color:T.dim, marginTop:3 }}>
            <span style={{ color:T.grn, fontWeight:700 }}>{activeCount} active stations</span> · {stations.length - activeCount} inactive · used in all fuel planning calculations
          </div>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search station or NH…" style={{ ...inp(), width:200, padding:"6px 10px" }} />
          <Btn v="primary" sm onClick={() => { setAdding(true); setEditId(null); setForm({ name:"", lat:"", lng:"", nh:"", active:true }); }}>+ Add Station</Btn>
          <Btn v="ghost" sm onClick={resetToDefault}>↺ Reset Defaults</Btn>
        </div>
      </div>

      {/* Warning if active stations drop low */}
      {activeCount < 10 && <div style={{ marginTop:10, padding:"8px 11px", background:"rgba(239,68,68,.08)", border:`1px solid rgba(239,68,68,.3)`, borderRadius:5, fontSize:11, color:T.red }}>
        ⚠ Only {activeCount} active stations — fuel planning accuracy will be low on long corridors. Activate more or add stations.
      </div>}
    </div>

    {/* Add new station form */}
    {adding && <div style={{ ...card(), border:`1px solid ${T.acc}44`, marginBottom:14 }}>
      <div style={{ fontWeight:700, color:T.acc, marginBottom:10, fontSize:12 }}>+ New LNG Station</div>
      <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr 1fr 1fr", gap:10, marginBottom:10 }}>
        <div><label style={lbl()}>Station Name</label><input value={form.name} onChange={e => sf("name", e.target.value)} placeholder="e.g. Pune LNG" style={inpS()} /></div>
        <div><label style={lbl()}>Latitude</label><input value={form.lat} onChange={e => sf("lat", e.target.value)} placeholder="18.520" style={inpS()} /></div>
        <div><label style={lbl()}>Longitude</label><input value={form.lng} onChange={e => sf("lng", e.target.value)} placeholder="73.856" style={inpS()} /></div>
        <div><label style={lbl()}>Highway</label><input value={form.nh} onChange={e => sf("nh", e.target.value)} placeholder="NH48" style={inpS()} /></div>
      </div>
      <div style={{ fontSize:10, color:T.dim, marginBottom:10 }}>
        💡 Find lat/lng: Google Maps → right-click any point → copy coordinates
      </div>
      <div style={{ display:"flex", gap:8 }}>
        <Btn v="primary" sm onClick={saveNew} disabled={!form.name||!form.lat||!form.lng}>Save Station</Btn>
        <Btn v="ghost" sm onClick={cancelEdit}>Cancel</Btn>
      </div>
    </div>}

    {/* Station table */}
    <div style={card()}>
      <div style={{ overflowX:"auto" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
          <thead>
            <tr style={{ borderBottom:`1px solid ${T.bdr}` }}>
              {["Active","ID","Station Name","Latitude","Longitude","Highway","Coverage*","Actions"].map(h =>
                <th key={h} style={{ padding:"8px 10px", textAlign:"left", fontSize:9, color:T.dim, textTransform:"uppercase", letterSpacing:"0.07em", fontWeight:700, whiteSpace:"nowrap" }}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {filtered.map(s => editId === s.id ? (
              // Inline edit row
              <tr key={s.id} style={{ background:"#071018", borderBottom:`1px solid ${T.acc}33` }}>
                <td style={{ padding:"6px 8px" }}><input type="checkbox" checked={form.active} onChange={e => sf("active", e.target.checked)} /></td>
                <td style={{ padding:"6px 8px", color:T.dim, fontSize:10 }}>{s.id}</td>
                <td style={{ padding:"6px 8px" }}><input value={form.name} onChange={e => sf("name", e.target.value)} style={{ ...inpS(), width:140 }} /></td>
                <td style={{ padding:"6px 8px" }}><input value={form.lat} onChange={e => sf("lat", e.target.value)} style={{ ...inpS(), width:90 }} /></td>
                <td style={{ padding:"6px 8px" }}><input value={form.lng} onChange={e => sf("lng", e.target.value)} style={{ ...inpS(), width:90 }} /></td>
                <td style={{ padding:"6px 8px" }}><input value={form.nh} onChange={e => sf("nh", e.target.value)} style={{ ...inpS(), width:70 }} /></td>
                <td style={{ padding:"6px 8px", color:T.dim, fontSize:10 }}>recalculates on save</td>
                <td style={{ padding:"6px 8px" }}>
                  <div style={{ display:"flex", gap:5 }}>
                    <Btn v="primary" sm onClick={saveEdit}>Save</Btn>
                    <Btn v="ghost" sm onClick={cancelEdit}>Cancel</Btn>
                  </div>
                </td>
              </tr>
            ) : (
              // Normal row
              <tr key={s.id} style={{ borderBottom:`1px solid ${T.bdr}`, opacity: s.active ? 1 : 0.4 }}>
                <td style={{ padding:"8px 10px" }}>
                  <div onClick={() => toggleActive(s.id)} style={{ width:32, height:18, borderRadius:9, background:s.active ? T.grn : T.surf, border:`1px solid ${s.active ? T.grn : T.bdrH}`, cursor:"pointer", position:"relative", transition:"background 0.2s" }}>
                    <div style={{ position:"absolute", top:2, left:s.active?14:2, width:12, height:12, borderRadius:"50%", background:"white", transition:"left 0.2s" }} />
                  </div>
                </td>
                <td style={{ padding:"8px 10px", color:T.dim, fontSize:10 }}>{s.id}</td>
                <td style={{ padding:"8px 10px", fontWeight:700, color: s.active ? T.acc : T.dim }}>{s.name}</td>
                <td style={{ padding:"8px 10px", color:T.sub, fontFamily:"monospace" }}>{s.lat.toFixed(3)}</td>
                <td style={{ padding:"8px 10px", color:T.sub, fontFamily:"monospace" }}>{s.lng.toFixed(3)}</td>
                <td style={{ padding:"8px 10px" }}><Pill col="blue">{s.nh}</Pill></td>
                <td style={{ padding:"8px 10px", color:T.dim, fontSize:10 }}>
                  {/* Show approximate corridors this station covers */}
                  {DEFAULT_LNG_STNS.find(d => d.id === s.id) ? "Standard" : "Custom"}
                </td>
                <td style={{ padding:"8px 10px" }}>
                  <div style={{ display:"flex", gap:5 }}>
                    <Btn v="ghost" sm onClick={() => startEdit(s)}>✏ Edit</Btn>
                    <Btn v="ghost" sm onClick={() => deleteStation(s.id)} style={{ color:T.red }}>✕</Btn>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{ marginTop:10, fontSize:10, color:T.dim }}>
        * Coverage = stations within range of a corridor segment. More stations = more routes viable without double tank. Toggle inactive to simulate a station being unavailable (maintenance, out of stock).
      </div>
    </div>
  </div>;
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [tab,            setTab]            = React.useState("config");
  const [cfg,            setCfg]            = React.useState(DEF_CFG);
  const [lanes,          setLanes]          = React.useState([]);
  const [stations,       setStations]       = React.useState(DEFAULT_LNG_STNS);
  const [masterCircuits, setMasterCircuits] = React.useState([]);
  const [masterStamp,    setMasterStamp]    = React.useState(null);   // timestamp when master was locked
  const [lanesStamp,     setLanesStamp]     = React.useState(null);   // timestamp of last lane change
  const [stationsStamp,  setStationsStamp]  = React.useState(null);   // timestamp of last station change
  const [status,         setStatus]         = React.useState("");

  // Keep LNG_STNS global in sync whenever stations change — planFuelLeg() reads it
  React.useEffect(() => {
    LNG_STNS = stations.filter(s => s.active);
  }, [stations]);

  // Track when lanes or stations change so we can warn if master is stale
  const setLanesTracked = React.useCallback(fn => {
    setLanes(fn);
    setLanesStamp(Date.now());
  }, []);
  const setStationsTracked = React.useCallback(fn => {
    setStations(fn);
    setStationsStamp(Date.now());
  }, []);

  const lockMaster = React.useCallback(circuits => {
    setMasterCircuits(circuits);
    setMasterStamp(Date.now());
  }, []);

  const masterIsStale = masterStamp && ((lanesStamp && lanesStamp > masterStamp) || (stationsStamp && stationsStamp > masterStamp));

  const TABS = [
    { id:"config",   ic:"⚙",  l:"Config" },
    { id:"master",   ic:"📥", l:`Lane Master${lanes.length ? ` (${lanes.length})` : ""}` },
    { id:"stations", ic:"⛽", l:`Station Master (${stations.filter(s=>s.active).length})` },
    { id:"yield",    ic:"📊", l:"Yield Analysis" },
    { id:"stitch",   ic:"🔗", l:`Circuits${masterCircuits.length ? ` 🔒${masterCircuits.length}${masterIsStale ? " ⚠" : ""}` : ""}` },
    { id:"advisor",  ic:"🔍", l:"Rate Advisor" },
    { id:"plan",     ic:"📅", l:"Monthly Plan" },
  ];

  return <div style={{ fontFamily:"inherit", background:T.bg, minHeight:"100vh", color:T.txt, fontSize:13 }}>
    {/* HEADER */}
    <div style={{ background:"linear-gradient(90deg,#020406,#050c18)", borderBottom:`1px solid ${T.bdr}`, padding:"11px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
      <div style={{ display:"flex", alignItems:"center", gap:11 }}>
        <div style={{ width:36, height:36, background:`linear-gradient(135deg,${T.acc},#1e40af)`, borderRadius:9, display:"flex", alignItems:"center", justifyContent:"center", fontSize:19 }}>🛣</div>
        <div>
          <div style={{ fontSize:17, fontWeight:800, color:T.acc, letterSpacing:"0.04em", lineHeight:1 }}>NETPLAN PRO v4</div>
          <div style={{ fontSize:9, color:T.dim, letterSpacing:"0.12em", textTransform:"uppercase", marginTop:2 }}>LNG/EV Logistics · Circuit Optimiser · Rate Advisor</div>
        </div>
      </div>
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
        <Pill col="blue">₹{cfg.yieldThreshold}/km target</Pill>
        <Pill col="orange">{cfg.maxLegs}-leg circuits</Pill>
        {lanes.length > 0 && <Pill col="green">{lanes.length} lanes</Pill>}
        <Pill col={stations.filter(s=>s.active).length < 15 ? "yellow" : "green"}>⛽ {stations.filter(s=>s.active).length} stations</Pill>
        {masterCircuits.length > 0 && <Pill col={masterIsStale ? "yellow" : "green"}>{masterIsStale ? "⚠ Master Stale" : `🔒 ${masterCircuits.length} circuits`}</Pill>}
        {status && <span style={{ fontSize:10, color:status.startsWith("✓") ? T.grn : status.startsWith("⚠") ? T.red : T.yel }}>{status}</span>}
      </div>
    </div>

    {/* STALE MASTER BANNER */}
    {masterIsStale && <div style={{ background:"rgba(245,158,11,.12)", borderBottom:`1px solid rgba(245,158,11,.4)`, padding:"8px 20px", fontSize:11, color:T.yel, display:"flex", alignItems:"center", justifyContent:"space-between", gap:10 }}>
      <span>⚠ <strong>Master circuits are stale</strong> — lanes or stations changed after the last lock. Go to 🔗 Circuits → re-run stitch → lock again for accurate Rate Advisor results.</span>
      <button onClick={() => setTab("stitch")} style={{ padding:"4px 12px", background:"rgba(245,158,11,.2)", border:`1px solid ${T.yel}`, borderRadius:4, color:T.yel, cursor:"pointer", fontSize:11, fontFamily:"inherit" }}>Go to Circuits →</button>
    </div>}

    {/* TABS */}
    <div style={{ display:"flex", background:"#030609", borderBottom:`1px solid ${T.bdr}`, padding:"0 16px", overflowX:"auto" }}>
      {TABS.map(t => <button key={t.id} onClick={() => setTab(t.id)} style={{ padding:"11px 16px", fontSize:11, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", cursor:"pointer", border:"none", borderBottom:tab === t.id ? `2px solid ${T.acc}` : "2px solid transparent", background:"transparent", color:tab === t.id ? T.acc : T.dim, fontFamily:"inherit", whiteSpace:"nowrap" }}>{t.ic} {t.l}</button>)}
    </div>

    {/* BODY */}
    <div style={{ padding:"16px 20px", maxWidth:1440, margin:"0 auto" }}>
      {tab === "config"   && <ConfigTab cfg={cfg} setCfg={setCfg} />}
      {tab === "master"   && <LaneMasterTab lanes={lanes} setLanes={setLanesTracked} cfg={cfg} setStatus={setStatus} />}
      {tab === "stations" && <StationMasterTab stations={stations} setStations={setStationsTracked} />}
      {tab === "yield"    && <YieldTab lanes={lanes} cfg={cfg} />}
      {tab === "stitch"   && <StitchTab lanes={lanes} cfg={cfg} masterCircuits={masterCircuits} setMasterCircuits={lockMaster} masterIsStale={masterIsStale} />}
      {tab === "advisor"  && <RateAdvisorTab masterCircuits={masterCircuits} cfg={cfg} masterIsStale={masterIsStale} />}
      {tab === "plan"     && <MonthlyPlanTab lanes={lanes} cfg={cfg} />}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
